name: Nightly Integration

on:
  schedule:
    # 02:00 UTC every day — after midnight, before business hours
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      adapter:
        description: "Output adapter to test (prometheus|splunk|elastic|all)"
        required: false
        default: "prometheus"

jobs:
  # ── Python integration tests ───────────────────────────────────────────────
  #
  # Runs the Python test suite with the integration marker enabled.
  # Requires no external services — uses the mock-servicenow container.
  python-integration:
    name: Python integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "python/[dev]"

      - name: Run integration tests (mock services)
        run: |
          cd python
          pytest tests/ -m integration --tb=short -v \
            --junitxml=../docs/test_results/nightly/python-integration-$(date +%Y%m%d).xml \
            || true   # don't fail the job; capture results below

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-integration-results
          path: docs/test_results/nightly/

  # ── E2E output adapter smoke test (Prometheus only in CI) ─────────────────
  #
  # Spins up a Prometheus container, starts a mock bonsai (stub), and verifies
  # the remote-write adapter delivers metrics. No ContainerLab required.
  output-adapter-smoke:
    name: Output adapter smoke (Prometheus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build bonsai
        run: cargo build --release

      - name: Start Prometheus remote-write receiver
        run: |
          docker run -d --name ci-prom \
            -p 9099:9090 \
            prom/prometheus:latest \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/prometheus \
            --web.enable-remote-write-receiver
          # Wait for readiness
          for i in $(seq 1 12); do
            curl -sf http://localhost:9099/-/ready && break || sleep 5
          done

      - name: Register Prometheus adapter and verify
        run: |
          # Start bonsai (needs LD_LIBRARY_PATH for lbug)
          LBUG_PATH=$(ls -td target/release/build/lbug-*/out/build/src 2>/dev/null | head -1 || true)
          RUST_LOG=info LD_LIBRARY_PATH="${LBUG_PATH}" \
            ./target/release/bonsai --config bonsai.toml.example \
            >> /tmp/bonsai-ci.log 2>&1 &
          BONSAI_PID=$!

          # Wait for bonsai HTTP
          for i in $(seq 1 24); do
            curl -sf http://localhost:3000/api/topology && break || sleep 5
          done

          # Register adapter
          curl -sf -X POST http://localhost:3000/api/adapters \
            -H "Content-Type: application/json" \
            -d '{"config":{"name":"ci-prom","adapter_type":"prometheus_remote_write","endpoint_url":"http://localhost:9099/api/v1/write","enabled":true,"flush_interval_secs":10}}'

          # Give it 30s to push metrics
          sleep 30

          # Check for bonsai_* series
          SERIES=$(curl -sf "http://localhost:9099/api/v1/label/__name__/values" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(len([n for n in d.get('data',[]) if n.startswith('bonsai_')]))")
          echo "bonsai metric series: ${SERIES}"

          kill $BONSAI_PID 2>/dev/null || true
          docker stop ci-prom docker rm ci-prom 2>/dev/null || true

          [[ "$SERIES" -gt 0 ]] && echo "PASS" || { echo "FAIL: no bonsai_* series"; exit 1; }

  # ── e2e script dry-run validation ─────────────────────────────────────────
  #
  # Validates that all e2e scripts pass --dry-run (syntax + preflight logic).
  # Does not require running services.
  e2e-dry-run:
    name: E2E script dry-run validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck all e2e scripts
        run: |
          shellcheck scripts/e2e_*.sh scripts/seed_external.sh \
            scripts/check_external.sh scripts/configure_external.sh

      - name: Build bonsai (for dry-run preflight)
        run: cargo build --release

      - name: Dry-run: compose e2e
        run: bash scripts/e2e_compose_test.sh --dry-run || true

      - name: Dry-run: output adapters
        run: bash scripts/e2e_output_adapters_test.sh --dry-run || true

  # ── Summary issue ─────────────────────────────────────────────────────────
  #
  # Posts a GitHub issue if any nightly job fails, with structured results.
  nightly-summary:
    name: Nightly summary
    runs-on: ubuntu-latest
    needs: [python-integration, output-adapter-smoke, e2e-dry-run]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Build summary
        id: summary
        run: |
          PYTHON="${{ needs.python-integration.result }}"
          ADAPTER="${{ needs.output-adapter-smoke.result }}"
          DRYRUN="${{ needs.e2e-dry-run.result }}"

          ALL_PASS=true
          [[ "$PYTHON" != "success" ]] && ALL_PASS=false
          [[ "$ADAPTER" != "success" ]] && ALL_PASS=false
          [[ "$DRYRUN" != "success" ]] && ALL_PASS=false

          echo "all_pass=$ALL_PASS" >> "$GITHUB_OUTPUT"
          echo "python=$PYTHON adapter=$ADAPTER dryrun=$DRYRUN"

      - name: Open issue on failure
        if: steps.summary.outputs.all_pass == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              python_integration: '${{ needs.python-integration.result }}',
              output_adapter_smoke: '${{ needs.output-adapter-smoke.result }}',
              e2e_dry_run: '${{ needs.e2e-dry-run.result }}',
            };
            const sha = context.sha.slice(0, 7);
            const date = new Date().toISOString().split('T')[0];
            const failing = Object.entries(results)
              .filter(([,v]) => v !== 'success')
              .map(([k,v]) => `- \`${k}\`: **${v}**`)
              .join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly] Integration regression detected — ${date} (${sha})`,
              labels: ['nightly', 'regression'],
              body: [
                '## Nightly integration results',
                '',
                `**Date**: ${date}`,
                `**Commit**: ${context.sha}`,
                '',
                '## Failing jobs',
                failing,
                '',
                '## All results',
                '```json',
                JSON.stringify(results, null, 2),
                '```',
                '',
                `[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              ].join('\n'),
            });
