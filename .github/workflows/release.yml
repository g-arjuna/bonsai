name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Build signed release artefacts ──────────────────────────────────────────

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artefact: bonsai-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artefact: bonsai-linux-arm64
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Install cross (for arm64 cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary (native)
        if: ${{ !matrix.cross }}
        env:
          LBUG_SHARED: "1"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        env:
          LBUG_SHARED: "1"
        run: cross build --release --target ${{ matrix.target }}

      - name: Bundle shared library alongside binary
        run: |
          OUTDIR="target/${{ matrix.target }}/release"
          LBUG_SO=$(find "$OUTDIR" -maxdepth 1 -name 'liblbug.so*' | head -1)
          mkdir -p dist
          cp "$OUTDIR/bonsai" dist/${{ matrix.artefact }}
          if [[ -n "$LBUG_SO" ]]; then
            cp "$LBUG_SO" dist/
          fi
          # Create a tarball with binary + shared lib
          tar -czf dist/${{ matrix.artefact }}.tar.gz -C dist \
              ${{ matrix.artefact }} $(basename "${LBUG_SO:-/dev/null}" 2>/dev/null || true)

      - name: Generate SHA-256 checksum
        run: |
          cd dist
          sha256sum ${{ matrix.artefact }}.tar.gz > ${{ matrix.artefact }}.tar.gz.sha256

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artefact }}
          path: dist/${{ matrix.artefact }}*

  # ── Create GitHub release with all artefacts ──────────────────────────────

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artefacts
        run: ls -lh dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "bonsai $TAG" \
            --generate-notes \
            dist/*.tar.gz dist/*.sha256
