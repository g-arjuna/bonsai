name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: build + test (nextest) + clippy ─────────────────────────────────
  rust:
    name: Rust build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build (timed)
        id: build
        run: |
          START=$(date +%s)
          cargo build --release
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "build_seconds=${ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "Build took ${ELAPSED}s"

      - name: Test
        run: cargo nextest run --release

      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Report build time
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const buildSecs = parseInt('${{ steps.build.outputs.build_seconds }}');
            const fs = require('fs');
            let baseline = null;
            try {
              const content = fs.readFileSync('docs/build_performance.md', 'utf8');
              const match = content.match(/CI_BASELINE_SECONDS=(\d+)/);
              if (match) baseline = parseInt(match[1]);
            } catch {}

            const summary = baseline
              ? `Build time: **${buildSecs}s** (baseline: ${baseline}s, Δ ${buildSecs - baseline}s / ${(((buildSecs - baseline) / baseline) * 100).toFixed(1)}%)`
              : `Build time: **${buildSecs}s** (no baseline yet — merging to main sets one)`;

            await core.summary.addRaw(`## Build Performance\n${summary}\n`).write();

            if (baseline && buildSecs > baseline * 1.10) {
              core.warning(
                `Build time regressed >10%: ${buildSecs}s vs baseline ${baseline}s`,
                { title: 'Build time regression' }
              );
            }

  # ── Dependency audit (cargo-deny) ────────────────────────────────────────
  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: --all-features

  # ── Rust coverage (cargo-llvm-cov) ───────────────────────────────────────
  coverage:
    name: Rust coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Summarise coverage
        run: cargo llvm-cov report --summary-only

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-lcov
          path: lcov.info
          retention-days: 14

  # ── Python tests + coverage ───────────────────────────────────────────────
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install --upgrade pip && pip install pytest pytest-asyncio pytest-cov pyyaml requests

      - name: Run tests with coverage
        working-directory: python
        run: |
          pytest tests/ -v \
            --cov=../scripts \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=30

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: python/coverage.xml
          retention-days: 14

  # ── Proto compatibility (buf breaking) ───────────────────────────────────
  proto:
    name: Proto compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-action@v1
        with:
          input: proto
          lint: false
          format: false
          push: false
          breaking: true
          breaking_against: '.git#branch=main,subdir=proto'

  # ── UI: build ─────────────────────────────────────────────────────────────
  ui:
    name: UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build
        working-directory: ui
        run: npm run build

  # ── Docker: amd64 on PRs, multi-arch on main ──────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.bonsai
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
