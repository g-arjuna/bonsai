name: Feedback Loop

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── 1. Rust build + clippy ────────────────────────────────────────────────
  rust-build:
    name: Rust build + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Tests
        run: cargo test --release

  # ── 2. API contract driver ────────────────────────────────────────────────
  api-driver:
    name: API contract driver
    needs: rust-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install requests

      - name: Create minimal bonsai.toml
        run: |
          cat > bonsai.toml <<'EOF'
          graph_path = "/tmp/bonsai-ci.db"

          [retention]
          enabled = true
          max_age_hours = 1
          max_state_change_events = 1000

          [event_bus]
          capacity = 256
          EOF

      - name: Start bonsai
        run: |
          LBUG_PATH=$(ls -td target/release/build/lbug-*/out/build/src 2>/dev/null | head -1 || true)
          RUST_LOG=warn LD_LIBRARY_PATH="${LBUG_PATH}" \
            ./target/release/bonsai --config bonsai.toml > /tmp/bonsai-ci.log 2>&1 &
          echo "BONSAI_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 12); do
            sleep 5
            curl -sf http://localhost:3000/api/topology >/dev/null 2>&1 && echo "bonsai ready" && break || true
          done

      - name: Run API driver
        run: |
          mkdir -p runtime/driver_results
          python tests/api_driver/run.py --output runtime/driver_results/api.json
          exit_code=$?
          echo "api_driver_exit=${exit_code}" >> "$GITHUB_ENV"
          exit ${exit_code}

      - name: Stop bonsai
        if: always()
        run: kill "$BONSAI_PID" 2>/dev/null || true

      - name: Upload driver results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-driver-results
          path: runtime/driver_results/api.json

      - name: Report API driver results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let passed = '?', failed = '?', total = '?';
            try {
              const r = JSON.parse(fs.readFileSync('runtime/driver_results/api.json', 'utf8'));
              passed = r.passed; failed = r.failed; total = r.passed + r.failed;
            } catch (_) {}
            const status = failed === 0 ? '✅ PASS' : '❌ FAIL';
            core.summary
              .addHeading('API Contract Driver Results')
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Value', header: true}],
                ['Status', status],
                ['Passed', String(passed)],
                ['Failed', String(failed)],
                ['Total', String(total)],
              ])
              .write();

  # ── 3. Event stream driver ────────────────────────────────────────────────
  event-driver:
    name: SSE event stream driver
    needs: rust-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install requests

      - name: Create minimal bonsai.toml
        run: |
          cat > bonsai.toml <<'EOF'
          graph_path = "/tmp/bonsai-ci-event.db"
          [retention]
          enabled = true
          [event_bus]
          capacity = 256
          EOF

      - name: Start bonsai
        run: |
          LBUG_PATH=$(ls -td target/release/build/lbug-*/out/build/src 2>/dev/null | head -1 || true)
          RUST_LOG=warn LD_LIBRARY_PATH="${LBUG_PATH}" \
            ./target/release/bonsai --config bonsai.toml > /tmp/bonsai-event.log 2>&1 &
          echo "BONSAI_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 12); do
            sleep 5
            curl -sf http://localhost:3000/api/topology >/dev/null 2>&1 && echo "bonsai ready" && break || true
          done

      - name: Run event stream driver (15s)
        run: |
          mkdir -p runtime/driver_results
          python tests/event_driver/run.py --duration 15 --output runtime/driver_results/event.json || true

      - name: Stop bonsai
        if: always()
        run: kill "$BONSAI_PID" 2>/dev/null || true

      - name: Upload driver results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: event-driver-results
          path: runtime/driver_results/event.json

  # ── 4. Playwright UI driver ───────────────────────────────────────────────
  ui-driver:
    name: Playwright UI driver
    needs: rust-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Svelte SPA
        run: cd ui && npm ci && npm run build

      - name: Install Playwright
        run: cd tests/ui_driver && npm ci && npx playwright install --with-deps chromium

      - name: Create minimal bonsai.toml
        run: |
          cat > bonsai.toml <<'EOF'
          graph_path = "/tmp/bonsai-ci-ui.db"
          [retention]
          enabled = true
          [event_bus]
          capacity = 256
          EOF

      - name: Start bonsai
        run: |
          LBUG_PATH=$(ls -td target/release/build/lbug-*/out/build/src 2>/dev/null | head -1 || true)
          RUST_LOG=warn LD_LIBRARY_PATH="${LBUG_PATH}" \
            ./target/release/bonsai --config bonsai.toml > /tmp/bonsai-ui.log 2>&1 &
          echo "BONSAI_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 12); do
            sleep 5
            curl -sf http://localhost:3000/api/topology >/dev/null 2>&1 && echo "bonsai ready" && break || true
          done

      - name: Run Playwright tests
        run: |
          mkdir -p runtime/driver_results
          cd tests/ui_driver && npx playwright test || true

      - name: Stop bonsai
        if: always()
        run: kill "$BONSAI_PID" 2>/dev/null || true

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            tests/ui_driver/playwright-report/
            runtime/driver_results/ui.json
