name: Memory Budget

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  memory-budget:
    name: Memory budget assertion (< 1 GB peak RSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Create minimal bonsai.toml for memory test
        run: |
          cat > /tmp/bonsai-memory-test.toml <<'EOF'
          graph_path = "/tmp/bonsai-mem-test.db"

          [retention]
          enabled = true
          max_age_hours = 1
          max_state_change_events = 1000

          [event_bus]
          capacity = 256

          [storage]
          max_archive_bytes = 104857600   # 100 MB
          max_graph_bytes   = 104857600   # 100 MB
          check_interval_secs = 30
          EOF

      - name: Run bonsai for 3 minutes with no devices (baseline RSS)
        run: |
          set -euo pipefail
          LBUG_PATH=$(ls -td target/release/build/lbug-*/out/build/src 2>/dev/null | head -1 || true)

          RUST_LOG=warn LD_LIBRARY_PATH="${LBUG_PATH}" \
            ./target/release/bonsai --config /tmp/bonsai-memory-test.toml \
            > /tmp/bonsai-mem.log 2>&1 &
          BONSAI_PID=$!

          # Wait up to 30s for HTTP to come up
          for i in $(seq 1 6); do
            sleep 5
            curl -sf http://localhost:3000/api/topology >/dev/null 2>&1 && break || true
          done

          echo "bonsai started (PID $BONSAI_PID)"

          # Run for 3 minutes, sampling RSS every 15s
          PEAK_RSS=0
          for i in $(seq 1 12); do
            sleep 15
            RSS=$(grep VmRSS /proc/${BONSAI_PID}/status 2>/dev/null | awk '{print $2}' || echo 0)
            RSS_BYTES=$((RSS * 1024))
            echo "  sample ${i}: RSS = $((RSS_BYTES / 1024 / 1024)) MB"
            if [[ $RSS_BYTES -gt $PEAK_RSS ]]; then
              PEAK_RSS=$RSS_BYTES
            fi
          done

          kill $BONSAI_PID 2>/dev/null || true

          PEAK_MB=$((PEAK_RSS / 1024 / 1024))
          BUDGET_MB=1024   # 1 GB budget

          echo "Peak RSS: ${PEAK_MB} MB  (budget: ${BUDGET_MB} MB)"
          echo "peak_rss_mb=${PEAK_MB}" >> "$GITHUB_ENV"

          if [[ $PEAK_MB -gt $BUDGET_MB ]]; then
            echo "FAIL: peak RSS ${PEAK_MB} MB exceeds budget ${BUDGET_MB} MB"
            exit 1
          fi
          echo "PASS: peak RSS ${PEAK_MB} MB is within budget"

      - name: Report memory usage
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const peakMb = process.env.peak_rss_mb || 'unknown';
            const budget = 1024;
            const status = parseInt(peakMb) > budget ? '❌ OVER BUDGET' : '✅ within budget';
            core.summary
              .addHeading('Memory Budget Results')
              .addTable([
                [{data: 'Metric', header: true}, {data: 'Value', header: true}],
                ['Peak RSS', `${peakMb} MB`],
                ['Budget', `${budget} MB`],
                ['Status', status],
              ])
              .write();
