duration_hours: 1
topology: bonsai-p4
injection_interval_seconds: [90, 240]

faults:
  - type: bgp_session_down
    weight: 4
    targets: [srl-spine1]
    peer_addresses: ["10.0.12.1", "10.0.13.1", "10.0.14.1"]
    healing_delay_seconds: [20, 45]

  - type: bgp_session_down
    weight: 3
    targets: [srl-leaf1]
    peer_addresses: ["10.0.12.0", "10.0.24.1"]
    healing_delay_seconds: [20, 45]

  - type: bgp_session_down
    weight: 3
    targets: [srl-leaf2]
    peer_addresses: ["10.0.13.0", "10.0.34.1"]
    healing_delay_seconds: [20, 45]

  - type: bgp_session_down
    weight: 2
    targets: [xrd-pe1]
    peer_addresses: ["10.0.14.0", "10.0.24.0", "10.0.34.0"]
    healing_delay_seconds: [20, 45]

  - type: interface_shut
    weight: 3
    targets: [srl-spine1]
    interfaces: ["ethernet-1/1", "ethernet-1/2", "ethernet-1/3"]
    healing_delay_seconds: [15, 30]

  - type: interface_shut
    weight: 2
    targets: [srl-leaf1]
    interfaces: ["ethernet-1/1", "ethernet-1/2"]
    healing_delay_seconds: [15, 30]

  - type: interface_shut
    weight: 2
    targets: [srl-leaf2]
    interfaces: ["ethernet-1/1", "ethernet-1/2"]
    healing_delay_seconds: [15, 30]

  - type: interface_shut
    weight: 1
    targets: [xrd-pe1]
    interfaces: ["GigabitEthernet0/0/0/0", "GigabitEthernet0/0/0/1", "GigabitEthernet0/0/0/2"]
    healing_delay_seconds: [15, 30]

  - type: netem_loss
    weight: 3
    targets: [srl-spine1]
    interfaces: ["e1-1", "e1-2", "e1-3"]
    loss_percent: [2, 8]
    healing_delay_seconds: [30, 75]

  - type: netem_loss
    weight: 2
    targets: [srl-leaf1]
    interfaces: ["e1-1", "e1-2"]
    loss_percent: [2, 8]
    healing_delay_seconds: [30, 75]

  - type: netem_loss
    weight: 2
    targets: [srl-leaf2]
    interfaces: ["e1-1", "e1-2"]
    loss_percent: [2, 8]
    healing_delay_seconds: [30, 75]
