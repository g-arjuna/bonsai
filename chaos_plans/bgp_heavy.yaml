duration_hours: 1
topology: bonsai-p4
injection_interval_seconds: [60, 180]

faults:
  - type: bgp_session_down
    weight: 7
    targets: [srl-spine1]
    peer_addresses: ["10.0.12.1", "10.0.13.1", "10.0.14.1"]
    healing_delay_seconds: [15, 35]

  - type: bgp_session_down
    weight: 5
    targets: [srl-leaf1]
    peer_addresses: ["10.0.12.0", "10.0.24.1"]
    healing_delay_seconds: [15, 35]

  - type: bgp_session_down
    weight: 5
    targets: [srl-leaf2]
    peer_addresses: ["10.0.13.0", "10.0.34.1"]
    healing_delay_seconds: [15, 35]

  - type: bgp_session_down
    weight: 4
    targets: [xrd-pe1]
    peer_addresses: ["10.0.14.0", "10.0.24.0", "10.0.34.0"]
    healing_delay_seconds: [15, 35]

  - type: interface_shut
    weight: 1
    targets: [srl-spine1]
    interfaces: ["ethernet-1/1", "ethernet-1/2", "ethernet-1/3"]
    healing_delay_seconds: [10, 20]

  - type: netem_loss
    weight: 1
    targets: [srl-spine1, srl-leaf1, srl-leaf2]
    interfaces: ["e1-1", "e1-2"]
    loss_percent: [1, 5]
    healing_delay_seconds: [20, 45]
