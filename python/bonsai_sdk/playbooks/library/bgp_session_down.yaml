detection_rule_id: bgp_session_down
description: |
  BGP session transitioned from established to idle.
  Playbooks are candidate remediations; selection is by vendor + preconditions.
  Only playbooks with preconditions_met() == True are eligible for a given detection.

playbooks:

  - name: srl_bgp_admin_state_bounce
    vendor: nokia_srl
    description: |
      Disable then re-enable the BGP neighbor admin-state on SR Linux.
      SRL exposes no "clear bgp" action RPC via gNMI — admin-state toggle is the
      only gNMI-accessible reset. Wait 1s between disable and enable to ensure the
      BGP FSM reaches idle before re-opening.
    risk_tier: safe
    preconditions:
      - "features.peer_address != ''"
      - "features.old_state == 'established'"
    steps:
      - gnmi_set:
          path: "network-instance[name=default]/protocols/bgp/neighbor[peer-address={peer_address}]/admin-state"
          value: '"disable"'
      - sleep: 1
      - gnmi_set:
          path: "network-instance[name=default]/protocols/bgp/neighbor[peer-address={peer_address}]/admin-state"
          value: '"enable"'
    verification:
      wait_seconds: 30
      cypher: |
        MATCH (d:Device {address: $device_address})-[:PEERS_WITH]->(n:BgpNeighbor {peer_address: $peer_address})
        WHERE n.session_state = 'established'
        RETURN count(n) > 0
    verified_on:
      - firmware: "24.7.2"
        last_tested: "2026-04-18"
        tested_by: "arjun"
    confidence: high

  - name: xrd_bgp_soft_clear
    vendor: cisco_xrd
    description: |
      Soft-clear the BGP session on IOS-XR via the clear-bgp action RPC.
      Requires Cisco-IOS-XR-ipv4-bgp-act model on the device.
    risk_tier: safe
    preconditions:
      - "features.peer_address != ''"
    steps:
      - gnmi_set:
          path: "Cisco-IOS-XR-ipv4-bgp-act:clear-bgp/instance/vrf/ipv4/unicast/neighbors/neighbor"
          value: '{"neighbor-address": "{peer_address}", "soft": true}'
    verification:
      wait_seconds: 30
      cypher: |
        MATCH (d:Device {address: $device_address})-[:PEERS_WITH]->(n:BgpNeighbor {peer_address: $peer_address})
        WHERE n.session_state = 'established'
        RETURN count(n) > 0
    verified_on: []
    confidence: unverified

  - name: no_action_alert_only
    vendor: "*"
    description: |
      No automated remediation available. Log the detection and alert the operator.
      Used when no vendor-specific playbook matches, or when auto_remediate=False.
    risk_tier: safe
    preconditions: []
    steps: []
    verification: ~
    verified_on:
      - firmware: "any"
        last_tested: "2026-04-18"
        tested_by: "arjun"
    confidence: high
