syntax = "proto3";
package bonsai.v1;

// ── Ad-hoc Cypher ─────────────────────────────────────────────────────────────

message QueryRequest {
  string cypher = 1;
}

message QueryResponse {
  // JSON array-of-arrays: [[val, val, ...], ...]  — empty string on error.
  string json_rows = 1;
  string error     = 2;
}

// ── Devices ───────────────────────────────────────────────────────────────────

message Device {
  string address       = 1;
  string vendor        = 2;
  string hostname      = 3;
  int64  updated_at_ns = 4;
}

message GetDevicesRequest  {}
message GetDevicesResponse { repeated Device devices = 1; }

// ── Interfaces ────────────────────────────────────────────────────────────────

message Interface {
  string device_address = 1;
  string name           = 2;
  int64  in_pkts        = 3;
  int64  out_pkts       = 4;
  int64  in_octets      = 5;
  int64  out_octets     = 6;
  int64  in_errors      = 7;
  int64  out_errors     = 8;
  int64  updated_at_ns  = 9;
}

message GetInterfacesRequest  { string device_address = 1; }  // empty = all
message GetInterfacesResponse { repeated Interface interfaces = 1; }

// ── BGP neighbors ─────────────────────────────────────────────────────────────

message BgpNeighbor {
  string device_address = 1;
  string peer_address   = 2;
  int64  peer_as        = 3;
  string session_state  = 4;
  int64  updated_at_ns  = 5;
}

message GetBgpNeighborsRequest  { string device_address = 1; }  // empty = all
message GetBgpNeighborsResponse { repeated BgpNeighbor neighbors = 1; }

// ── Topology ──────────────────────────────────────────────────────────────────

message TopologyEdge {
  string src_device    = 1;
  string src_interface = 2;
  string dst_device    = 3;
  string dst_interface = 4;
}

message GetTopologyRequest  {}
message GetTopologyResponse { repeated TopologyEdge edges = 1; }

// ── Real-time event streaming ─────────────────────────────────────────────────

message StreamEventsRequest {
  repeated string event_types    = 1;  // empty = all types
  string          device_address = 2;  // empty = all devices
}

message StateEvent {
  string device_address = 1;
  string event_type     = 2;
  string detail_json    = 3;
  int64  occurred_at_ns = 4;
}

// ── Phase 4: Detection + Remediation writes ───────────────────────────────────

message CreateDetectionRequest {
  string device_address = 1;
  string rule_id        = 2;
  string severity       = 3;  // "info" | "warn" | "critical"
  string features_json  = 4;  // full feature vector — stored for Phase 5 ML training
  int64  fired_at_ns    = 5;
}
message CreateDetectionResponse {
  string id    = 1;  // UUID of the new DetectionEvent node
  string error = 2;
}

message CreateRemediationRequest {
  string detection_id    = 1;
  string action          = 2;
  string status          = 3;  // "pending" | "success" | "failed" | "skipped"
  string detail_json     = 4;
  int64  attempted_at_ns = 5;
  int64  completed_at_ns = 6;  // 0 if still pending
}
message CreateRemediationResponse {
  string id    = 1;
  string error = 2;
}

// ── Phase 4: gNMI Set back to device ─────────────────────────────────────────

message PushRemediationRequest {
  string target_address = 1;   // must match a [[target]] address in bonsai.toml
  string yang_path      = 2;   // e.g. "interface[name=ethernet-1/1]/admin-state"
  string json_value     = 3;   // RFC 7951 JSON value, e.g. "\"disable\""
}
message PushRemediationResponse {
  bool   success = 1;
  string error   = 2;
}

// ── Service ───────────────────────────────────────────────────────────────────

service BonsaiGraph {
  // Execute a read-only Cypher query.
  rpc Query(QueryRequest) returns (QueryResponse);

  // Typed read helpers.
  rpc GetDevices(GetDevicesRequest)           returns (GetDevicesResponse);
  rpc GetInterfaces(GetInterfacesRequest)     returns (GetInterfacesResponse);
  rpc GetBgpNeighbors(GetBgpNeighborsRequest) returns (GetBgpNeighborsResponse);
  rpc GetTopology(GetTopologyRequest)         returns (GetTopologyResponse);

  // Server-streaming: push events to the caller as they occur.
  rpc StreamEvents(StreamEventsRequest) returns (stream StateEvent);

  // Phase 4: write detections and remediations into the graph.
  rpc CreateDetection(CreateDetectionRequest)   returns (CreateDetectionResponse);
  rpc CreateRemediation(CreateRemediationRequest) returns (CreateRemediationResponse);

  // Phase 4: execute a gNMI Set on a managed device (credentials stay in Rust).
  rpc PushRemediation(PushRemediationRequest) returns (PushRemediationResponse);
}
