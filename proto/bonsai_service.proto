syntax = "proto3";
package bonsai.v1;

// ── Ad-hoc Cypher ─────────────────────────────────────────────────────────────

message QueryRequest {
  string cypher = 1;
}

message QueryResponse {
  // JSON array-of-arrays: [[val, val, ...], ...]  — empty string on error.
  string json_rows = 1;
  string error     = 2;
}

// ── Devices ───────────────────────────────────────────────────────────────────

message Device {
  string address       = 1;
  string vendor        = 2;
  string hostname      = 3;
  int64  updated_at_ns = 4;
}

message GetDevicesRequest  {}
message GetDevicesResponse { repeated Device devices = 1; }

message ManagedDevice {
  string address      = 1;
  string tls_domain   = 2;
  string ca_cert      = 3;
  string vendor       = 4;
  string username_env = 5;
  string password_env = 6;
  string hostname     = 7;
  string role         = 8;
  string site         = 9;
  string credential_alias = 10;
  repeated SubscriptionPath selected_paths = 11;
  optional bool enabled = 12;
  string collector_id = 13;
}

message AddDeviceRequest        { ManagedDevice device = 1; }
message UpdateDeviceRequest     { ManagedDevice device = 1; }
message RemoveDeviceRequest     { string address = 1; }
message ListManagedDevicesRequest  {}
message ListManagedDevicesResponse { repeated ManagedDevice devices = 1; }

message DeviceMutationResponse {
  bool          success = 1;
  string        error   = 2;
  ManagedDevice device  = 3;
}

message Site {
  string id            = 1;
  string name          = 2;
  string parent_id     = 3;
  string kind          = 4;
  double lat           = 5;
  double lon           = 6;
  string metadata_json = 7;
}

message ListSitesRequest {}
message ListSitesResponse { repeated Site sites = 1; }
message AddSiteRequest    { Site site = 1; }
message UpdateSiteRequest { Site site = 1; }

message SiteMutationResponse {
  bool   success = 1;
  string error   = 2;
  Site   site    = 3;
}

message Credential {
  string alias            = 1;
  int64  created_at_ns    = 2;
  int64  updated_at_ns    = 3;
  int64  last_used_at_ns  = 4;
}

message AddCredentialRequest {
  string alias    = 1;
  string username = 2;
  string password = 3;
}

message RemoveCredentialRequest { string alias = 1; }
message ListCredentialsRequest  {}
message ListCredentialsResponse { repeated Credential credentials = 1; }

message CredentialMutationResponse {
  bool       success    = 1;
  string     error      = 2;
  Credential credential = 3;
}

message DiscoverRequest {
  string address      = 1;
  string username_env = 2;
  string password_env = 3;
  string ca_cert_path = 4;
  string tls_domain   = 5;
  string role_hint    = 6;
  string credential_alias = 7;
}

message SubscriptionPath {
  string path               = 1;
  string origin             = 2;
  string mode               = 3;
  uint64 sample_interval_ns = 4;
  string rationale          = 5;
  bool optional             = 6;
}

message PathProfileMatch {
  string profile_name             = 1;
  repeated SubscriptionPath paths = 2;
  string rationale                = 3;
  float  confidence               = 4;
}

message DiscoveryReport {
  string vendor_detected                     = 1;
  repeated string models_advertised          = 2;
  string gnmi_encoding                       = 3;
  repeated PathProfileMatch recommended_profiles = 4;
  repeated string warnings                   = 5;
}

// ── Interfaces ────────────────────────────────────────────────────────────────

message Interface {
  string device_address = 1;
  string name           = 2;
  int64  in_pkts        = 3;
  int64  out_pkts       = 4;
  int64  in_octets      = 5;
  int64  out_octets     = 6;
  int64  in_errors      = 7;
  int64  out_errors     = 8;
  int64  updated_at_ns  = 9;
}

message GetInterfacesRequest  { string device_address = 1; }  // empty = all
message GetInterfacesResponse { repeated Interface interfaces = 1; }

// ── BGP neighbors ─────────────────────────────────────────────────────────────

message BgpNeighbor {
  string device_address = 1;
  string peer_address   = 2;
  int64  peer_as        = 3;
  string session_state  = 4;
  int64  updated_at_ns  = 5;
}

message GetBgpNeighborsRequest  { string device_address = 1; }  // empty = all
message GetBgpNeighborsResponse { repeated BgpNeighbor neighbors = 1; }

// ── Topology ──────────────────────────────────────────────────────────────────

message TopologyEdge {
  string src_device    = 1;
  string src_interface = 2;
  string dst_device    = 3;
  string dst_interface = 4;
}

message GetTopologyRequest  {}
message GetTopologyResponse { repeated TopologyEdge edges = 1; }

// ── Real-time event streaming ─────────────────────────────────────────────────

message StreamEventsRequest {
  repeated string event_types    = 1;  // empty = all types
  string          device_address = 2;  // empty = all devices
}

message StateEvent {
  string device_address         = 1;
  string event_type             = 2;
  string detail_json            = 3;
  int64  occurred_at_ns         = 4;
  string state_change_event_id  = 5;  // UUID of the StateChangeEvent node in the graph
}

// Distributed collector ingest. Collector-mode instances stream decoded gNMI
// telemetry to a core-mode instance, which republishes each update onto its
// local event bus for graph/archive/rule consumers.
message TelemetryIngestUpdate {
  string collector_id = 1;
  string target       = 2;
  string vendor       = 3;
  string hostname     = 4;
  int64  timestamp_ns = 5;
  string path         = 6;
  bytes  value_msgpack = 7;
  uint32 protocol_version = 8; // Stub for version negotiation
  InterfaceSummary interface_summary = 9;
  string role         = 10;
  string site         = 11;
}

message InterfaceCounterSummary {
  string counter_name = 1;
  int64  min          = 2;
  int64  max          = 3;
  double mean         = 4;
  int64  delta        = 5;
}

message InterfaceSummary {
  repeated InterfaceCounterSummary counters = 1;
  uint32 window_secs = 2;
  string target   = 3;
  string if_name  = 4;
}

message TelemetryIngestResponse {
  uint64 accepted = 1;
  string error    = 2;
  uint32 protocol_version = 3; // Stub for version negotiation
}

message DetectionEventIngest {
  string collector_id          = 1;
  string device_address        = 2;
  string rule_id               = 3;
  string severity              = 4;
  string reason                = 5;
  string features_json         = 6;
  int64  fired_at_ns           = 7;
  string state_change_event_id = 8;
  bool   auto_remediate        = 9;
  string remediation_action    = 10;
}

message DetectionIngestResponse {
  uint64 accepted = 1;
  string error    = 2;
}

// ── Phase 4: Detection + Remediation writes ───────────────────────────────────

message CreateDetectionRequest {
  string device_address        = 1;
  string rule_id               = 2;
  string severity              = 3;  // "info" | "warn" | "critical"
  string features_json         = 4;  // full feature vector — stored for Phase 5 ML training
  int64  fired_at_ns           = 5;
  string state_change_event_id = 6;  // UUID of the triggering StateChangeEvent; empty for poll-based rules
}
message CreateDetectionResponse {
  string id    = 1;  // UUID of the new DetectionEvent node
  string error = 2;
}

message CreateRemediationRequest {
  string detection_id    = 1;
  string action          = 2;
  string status          = 3;  // "pending" | "success" | "failed" | "skipped"
  string detail_json     = 4;
  int64  attempted_at_ns = 5;
  int64  completed_at_ns = 6;  // 0 if still pending
}
message CreateRemediationResponse {
  string id    = 1;
  string error = 2;
}

// ── Phase 4: gNMI Set back to device ─────────────────────────────────────────

message PushRemediationRequest {
  string target_address = 1;   // must match a [[target]] address in bonsai.toml
  string yang_path      = 2;   // e.g. "interface[name=ethernet-1/1]/admin-state"
  string json_value     = 3;   // RFC 7951 JSON value, e.g. "\"disable\""
}
message PushRemediationResponse {
  bool   success = 1;
  string error   = 2;
}

// Distributed collector registration and assignment.
message CollectorIdentity {
  string collector_id     = 1;
  string hostname         = 2;
  uint32 protocol_version = 3;
}

message DeviceAssignment {
  ManagedDevice device   = 1;
  string        username = 2; // Resolved on core
  string        password = 3; // Resolved on core
}

message AssignmentUpdate {
  repeated DeviceAssignment assignments = 1;
  bool                      is_full_sync = 2; // If true, collector should drop other devices
}

message CollectorStats {
  string collector_id        = 1;
  uint64 queue_depth_updates = 2;
  uint32 subscription_count  = 3;
  int64  uptime_secs         = 4;
}

message HeartbeatAck {
  string error = 1;
}

// ── Service ───────────────────────────────────────────────────────────────────

service BonsaiGraph {
  // ... existing rpcs ...

  // Bidirectional streaming: collector registers and receives device assignments.
  rpc RegisterCollector(CollectorIdentity) returns (stream AssignmentUpdate);

  // Unary: periodic heartbeat from collector to core.
  rpc Heartbeat(CollectorStats) returns (HeartbeatAck);

  // Execute a read-only Cypher query.
  rpc Query(QueryRequest) returns (QueryResponse);

  // Typed read helpers.
  rpc GetDevices(GetDevicesRequest)           returns (GetDevicesResponse);
  rpc GetInterfaces(GetInterfacesRequest)     returns (GetInterfacesResponse);
  rpc GetBgpNeighbors(GetBgpNeighborsRequest) returns (GetBgpNeighborsResponse);
  rpc GetTopology(GetTopologyRequest)         returns (GetTopologyResponse);

  // Runtime-managed device registry.
  rpc ListManagedDevices(ListManagedDevicesRequest) returns (ListManagedDevicesResponse);
  rpc AddDevice(AddDeviceRequest)                   returns (DeviceMutationResponse);
  rpc UpdateDevice(UpdateDeviceRequest)             returns (DeviceMutationResponse);
  rpc RemoveDevice(RemoveDeviceRequest)             returns (DeviceMutationResponse);
  rpc DiscoverDevice(DiscoverRequest)               returns (DiscoveryReport);
  rpc ListSites(ListSitesRequest)                    returns (ListSitesResponse);
  rpc AddSite(AddSiteRequest)                        returns (SiteMutationResponse);
  rpc UpdateSite(UpdateSiteRequest)                  returns (SiteMutationResponse);
  rpc ListCredentials(ListCredentialsRequest)        returns (ListCredentialsResponse);
  rpc AddCredential(AddCredentialRequest)            returns (CredentialMutationResponse);
  rpc RemoveCredential(RemoveCredentialRequest)      returns (CredentialMutationResponse);

  // Server-streaming: push events to the caller as they occur.
  rpc StreamEvents(StreamEventsRequest) returns (stream StateEvent);

  // Client-streaming: collectors push decoded telemetry updates into a core.
  rpc TelemetryIngest(stream TelemetryIngestUpdate) returns (TelemetryIngestResponse);

  // Client-streaming: collectors push locally-evaluated detections to core.
  rpc DetectionIngest(stream DetectionEventIngest) returns (DetectionIngestResponse);

  // Phase 4: write detections and remediations into the graph.
  rpc CreateDetection(CreateDetectionRequest)   returns (CreateDetectionResponse);
  rpc CreateRemediation(CreateRemediationRequest) returns (CreateRemediationResponse);

  // Phase 4: execute a gNMI Set on a managed device (credentials stay in Rust).
  rpc PushRemediation(PushRemediationRequest) returns (PushRemediationResponse);
}
