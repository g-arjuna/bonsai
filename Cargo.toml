[package]
name = "bonsai"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "bonsai"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# gRPC transport
tonic = { version = "0.13", features = ["tls-ring"] }

# Protobuf serialization
prost = "0.13"
prost-types = "0.13"

# Serialization (JSON output for Phase 1)
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Logging / tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"

[build-dependencies]
# Protobuf code generation from .proto files
tonic-build = "0.13"
