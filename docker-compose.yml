x-bonsai-base: &bonsai-base
  build:
    context: .
    dockerfile: docker/Dockerfile.bonsai
  image: bonsai:latest
  restart: unless-stopped
  environment:
    - RUST_LOG=info,bonsai=debug
    # BONSAI_VAULT_PASSPHRASE must be set in the environment or an .env file.
    # The compose will refuse to start if it is missing. Never use a shared default.
    # See .env.example for setup instructions.
    - BONSAI_VAULT_PASSPHRASE=${BONSAI_VAULT_PASSPHRASE:?BONSAI_VAULT_PASSPHRASE is required — see .env.example}
  volumes:
    - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro

services:
  bonsai-all:
    <<: *bonsai-base
    profiles: ["dev"]
    volumes:
      - bonsai_graph_dev:/app/runtime
      - bonsai_creds_dev:/app/bonsai-credentials
      - ./docker/configs/all.toml:/etc/bonsai/bonsai.toml:ro
      - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro
    ports:
      - "3000:3000"
      - "50051:50051"
    networks:
      - bonsai-p4-mgmt

  bonsai-core:
    <<: *bonsai-base
    profiles: ["distributed", "two-collector"]
    volumes:
      - bonsai_graph:/app/runtime
      - bonsai_creds:/app/bonsai-credentials
      - ./docker/configs/core.toml:/etc/bonsai/bonsai.toml:ro
      - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro
      - ./docker/tls:/app/tls:ro
    ports:
      - "3000:3000"
      - "50051:50051"
    networks:
      - bonsai-p4-mgmt
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  bonsai-collector-1:
    <<: *bonsai-base
    profiles: ["distributed", "two-collector"]
    depends_on:
      bonsai-core:
        condition: service_healthy
    volumes:
      - collector_1_queue:/app/runtime
      - ./docker/configs/collector-1.toml:/etc/bonsai/bonsai.toml:ro
      - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro
      - ./docker/tls:/app/tls:ro
    networks:
      - bonsai-p4-mgmt

  bonsai-collector-2:
    <<: *bonsai-base
    profiles: ["two-collector"]
    depends_on:
      bonsai-core:
        condition: service_healthy
    volumes:
      - collector_2_queue:/app/runtime
      - ./docker/configs/collector-2.toml:/etc/bonsai/bonsai.toml:ro
      - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro
      - ./docker/tls:/app/tls:ro
    networks:
      - bonsai-p4-mgmt

  chaos:
    image: gaiaadm/pumba
    profiles: ["chaos"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Parameterise via env vars; override with CHAOS_DELAY_MS and CHAOS_DURATION_MS.
    command: >
      netem --duration ${CHAOS_DURATION:-5m}
      delay --time ${CHAOS_DELAY_MS:-500}
      re2:^bonsai-collector

networks:
  # The ContainerLab management network. Override CLAB_NETWORK to match your
  # topology. Defaults to the bonsai-p4 fast-iteration lab network.
  bonsai-p4-mgmt:
    external: true
    name: ${CLAB_NETWORK:-bonsai-p4-mgmt}

volumes:
  bonsai_graph_dev:
  bonsai_creds_dev:
  bonsai_graph:
  bonsai_creds:
  collector_1_queue:
  collector_2_queue:
