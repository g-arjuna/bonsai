version: '3.8'

x-bonsai-base: &bonsai-base
  build:
    context: .
    dockerfile: docker/Dockerfile.bonsai
  image: bonsai:latest
  restart: unless-stopped
  environment:
    - RUST_LOG=info,bonsai=debug
    - BONSAI_VAULT_PASSPHRASE=${BONSAI_VAULT_PASSPHRASE:-changeme}
    # Mount the Containerlab TLS certs to the same path so that ca_cert paths match
  volumes:
    - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro

services:
  bonsai-all:
    <<: *bonsai-base
    profiles: ["dev"]
    container_name: bonsai-dev
    volumes:
      - bonsai_graph_dev:/app/runtime
      - bonsai_creds_dev:/app/bonsai-credentials
      - ./docker/configs/all.toml:/etc/bonsai/bonsai.toml:ro
      - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro
    ports:
      - "3000:3000"
      - "50051:50051"
    networks:
      - bonsai-p4-mgmt

  bonsai-core:
    <<: *bonsai-base
    profiles: ["distributed", "two-collector"]
    container_name: bonsai-core
    volumes:
      - bonsai_graph:/app/runtime
      - bonsai_creds:/app/bonsai-credentials
      - ./docker/configs/core.toml:/etc/bonsai/bonsai.toml:ro
      - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro
    ports:
      - "3000:3000"
      - "50051:50051"
    networks:
      - bonsai-p4-mgmt

  bonsai-collector-1:
    <<: *bonsai-base
    profiles: ["distributed", "two-collector"]
    container_name: bonsai-collector-1
    depends_on:
      - bonsai-core
    volumes:
      - collector_1_queue:/app/runtime
      - ./docker/configs/collector-1.toml:/etc/bonsai/bonsai.toml:ro
      - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro
    networks:
      - bonsai-p4-mgmt

  bonsai-collector-2:
    <<: *bonsai-base
    profiles: ["two-collector"]
    container_name: bonsai-collector-2
    depends_on:
      - bonsai-core
    volumes:
      - collector_2_queue:/app/runtime
      - ./docker/configs/collector-2.toml:/etc/bonsai/bonsai.toml:ro
      - ./lab/fast-iteration/p4-ca.pem:/app/lab/fast-iteration/p4-ca.pem:ro
    networks:
      - bonsai-p4-mgmt

  chaos:
    image: gaiaadm/pumba
    profiles: ["chaos"]
    container_name: bonsai-chaos
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: netem --duration 5m delay --time 500 re2:^bonsai-collector

networks:
  bonsai-p4-mgmt:
    external: true

volumes:
  bonsai_graph_dev:
  bonsai_creds_dev:
  bonsai_graph:
  bonsai_creds:
  collector_1_queue:
  collector_2_queue:
