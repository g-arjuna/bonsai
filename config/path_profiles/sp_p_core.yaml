name: sp_p_core
roles: ["p"]
description: "Service-provider P-core profile: interface, IS-IS, MPLS/LDP, and segment-routing telemetry; no BGP by default."
rationale: "P-core devices usually carry transport and IGP state; BGP is intentionally omitted unless another profile is selected."
paths:
  - path: "interfaces"
    origin: openconfig
    mode: SAMPLE
    sample_interval_ns: 10000000000
    required_models: ["openconfig-interfaces"]
    rationale: "OpenConfig interface counters."
  - path: "interfaces"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-interfaces"]
    rationale: "OpenConfig interface oper-state changes."
  - path: "lldp"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-lldp"]
    optional: true
    rationale: "OpenConfig LLDP topology evidence when advertised."
  - path: "mpls"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-mpls"]
    rationale: "MPLS state for transport health."
  - path: "network-instances/network-instance/protocols/protocol/isis"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-isis"]
    rationale: "IS-IS state for SP underlay health."
  - path: "segment-routing"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-segment-routing"]
    rationale: "Segment-routing state when advertised."
