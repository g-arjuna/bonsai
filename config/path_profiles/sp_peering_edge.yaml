name: sp_peering_edge
environment: ["service_provider"]
vendor_scope: []
roles: ["peering", "edge", "ce-facing"]
description: "Service-provider peering edge: external BGP sessions, BFD, interface health, and prefix-filter state."
rationale: "Peering devices terminate eBGP sessions with peers and customers; session health, prefix-count anomalies, and BFD state are the primary failure signals. No MPLS or IGP paths by default."
paths:
  - path: "Cisco-IOS-XR-infra-statsd-oper:infra-statistics/interfaces/interface[interface-name=*]/generic-counters"
    origin: ""
    mode: SAMPLE
    sample_interval_ns: 10000000000
    required_any_models: ["Cisco-IOS-XR-infra-statsd-oper"]
    vendor_only: ["cisco_xrd"]
    rationale: "IOS-XR native interface counters — peering link utilisation."
  - path: "Cisco-IOS-XR-ipv4-bgp-oper:bgp/instances/instance/instance-active/default-vrf/neighbors/neighbor"
    origin: ""
    mode: ON_CHANGE
    required_any_models: ["Cisco-IOS-XR-ipv4-bgp-oper"]
    vendor_only: ["cisco_xrd"]
    fallback_for: "network-instances"
    rationale: "IOS-XR native BGP neighbor state for eBGP peering sessions."
  - path: "Cisco-IOS-XR-ipv4-bgp-oper:bgp/instances/instance/instance-active/default-vrf/afs/af"
    origin: ""
    mode: SAMPLE
    sample_interval_ns: 60000000000
    required_any_models: ["Cisco-IOS-XR-ipv4-bgp-oper"]
    vendor_only: ["cisco_xrd"]
    optional: true
    rationale: "IOS-XR native BGP AFI summary — received prefix counts per peer."
  - path: "network-instance[name=default]/protocols/bgp/neighbor[peer-address=*]"
    origin: ""
    mode: ON_CHANGE
    required_any_models: ["srl_nokia"]
    vendor_only: ["nokia_srl"]
    rationale: "SR Linux native BGP peering session state."
  - path: "interfaces"
    origin: openconfig
    mode: SAMPLE
    sample_interval_ns: 10000000000
    required_models: ["openconfig-interfaces"]
    rationale: "OpenConfig interface counters — peering link bandwidth and error rates."
  - path: "interfaces"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-interfaces"]
    rationale: "OpenConfig interface oper-state."
  - path: "network-instances"
    origin: openconfig
    mode: ON_CHANGE
    required_any_models: ["openconfig-bgp", "openconfig-network-instance"]
    rationale: "OpenConfig BGP — eBGP session state and received/advertised prefix counts."
  - path: "network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi"
    origin: openconfig
    mode: SAMPLE
    sample_interval_ns: 60000000000
    required_any_models: ["openconfig-bgp"]
    optional: true
    rationale: "OpenConfig per-AFI prefix counts — anomaly detection on received-prefix count drops."
  - path: "bfd"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-bfd"]
    optional: true
    rationale: "OpenConfig BFD for fast peering link failure detection."
  - path: "lldp"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-lldp"]
    optional: true
    rationale: "OpenConfig LLDP — typically disabled on external peering interfaces but useful on IXP segments."
