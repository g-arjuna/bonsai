name: dc_superspine_standard
environment: ["data_center"]
vendor_scope: []
roles: ["superspine", "spine", "distribution", "border"]
description: "Data-center superspine telemetry: interfaces, BGP route fanout, ECMP health, and LLDP."
rationale: "Superspine devices carry aggregated BGP sessions; interface and BGP fanout health are the primary signals. BFD on all uplinks."
paths:
  - path: "interface[name=*]/statistics"
    origin: ""
    mode: SAMPLE
    sample_interval_ns: 10000000000
    required_any_models: ["srl_nokia"]
    vendor_only: ["nokia_srl"]
    rationale: "SR Linux native interface counters for high-speed uplink monitoring."
  - path: "interface[name=*]/oper-state"
    origin: ""
    mode: ON_CHANGE
    required_any_models: ["srl_nokia"]
    vendor_only: ["nokia_srl"]
    rationale: "SR Linux native interface state — superspine link flaps propagate immediately."
  - path: "network-instance[name=default]/protocols/bgp/neighbor[peer-address=*]"
    origin: ""
    mode: ON_CHANGE
    required_any_models: ["srl_nokia"]
    vendor_only: ["nokia_srl"]
    rationale: "SR Linux native BGP — superspine may have hundreds of sessions."
  - path: "system/lldp/interface[name=*]/neighbor[id=*]"
    origin: ""
    mode: ON_CHANGE
    required_any_models: ["srl_nokia"]
    vendor_only: ["nokia_srl"]
    rationale: "SR Linux native LLDP for cabling verification."
  - path: "bfd/network-instance[name=default]"
    origin: ""
    mode: ON_CHANGE
    required_any_models: ["srl_nokia-bfd"]
    vendor_only: ["nokia_srl"]
    optional: true
    rationale: "SR Linux native BFD — fast failure detection on spine-leaf uplinks."
  - path: "Cisco-IOS-XR-infra-statsd-oper:infra-statistics/interfaces/interface[interface-name=*]/generic-counters"
    origin: ""
    mode: SAMPLE
    sample_interval_ns: 10000000000
    required_any_models: ["Cisco-IOS-XR-infra-statsd-oper"]
    vendor_only: ["cisco_xrd"]
    rationale: "IOS-XR native interface counters."
  - path: "Cisco-IOS-XR-ipv4-bgp-oper:bgp/instances/instance/instance-active/default-vrf/neighbors/neighbor"
    origin: ""
    mode: ON_CHANGE
    required_any_models: ["Cisco-IOS-XR-ipv4-bgp-oper"]
    vendor_only: ["cisco_xrd"]
    fallback_for: "network-instances"
    rationale: "IOS-XR native BGP neighbor state when openconfig-bgp not advertised."
  - path: "interfaces"
    origin: openconfig
    mode: SAMPLE
    sample_interval_ns: 10000000000
    required_models: ["openconfig-interfaces"]
    rationale: "OpenConfig interface counters for vendor-neutral traffic rates."
  - path: "interfaces"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-interfaces"]
    rationale: "OpenConfig interface oper-state events."
  - path: "network-instances"
    origin: openconfig
    mode: ON_CHANGE
    required_any_models: ["openconfig-bgp", "openconfig-network-instance"]
    rationale: "OpenConfig BGP — all superspine sessions, peer state, prefixes."
  - path: "bfd"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-bfd"]
    optional: true
    rationale: "OpenConfig BFD fast failure detection when model is advertised."
  - path: "lldp"
    origin: openconfig
    mode: ON_CHANGE
    required_models: ["openconfig-lldp"]
    rationale: "OpenConfig LLDP physical topology."
