# cargo-deny configuration — T4-4 (v10 CI hardening)
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []  # check all targets

# ── License policy ────────────────────────────────────────────────────────────

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "Zlib",
    "OpenSSL",
]
private = { ignore = true }

# ring uses a custom non-SPDX license bundle; allow explicitly.
[[licenses.exceptions]]
allow = ["ISC", "MIT", "OpenSSL"]
name = "ring"

# webpki uses ISC
[[licenses.exceptions]]
allow = ["ISC"]
name = "untrusted"

# ── Advisory database (RUSTSEC) ───────────────────────────────────────────────

[advisories]
version = 2
# Use the bundled advisory database; no network required in CI.
ignore = []

# ── Crate bans ────────────────────────────────────────────────────────────────

[bans]
multiple-versions = "warn"   # warn on diamond dependencies; fail on real dups
wildcards = "allow"          # allow wildcard deps in dev-dependencies
deny = []

# ── Source policy ────────────────────────────────────────────────────────────

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
