global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Bonsai metrics — running on the host (or at BONSAI_METRICS_ADDR if overridden)
  - job_name: bonsai
    static_configs:
      - targets: ["host.docker.internal:9090"]
    relabel_configs:
      - target_label: instance
        replacement: bonsai-lab
