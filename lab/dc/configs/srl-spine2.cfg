# srl-spine2 — DC lab spine (Nokia SR Linux)
# Loopback:  10.1.0.4/32   fc00:1:4::1/128
# e1-1: 10.1.10.3/31  to srl-super1 e1-2  (spine=.3, super1=.2)
# e1-2: 10.1.10.7/31  to srl-super2 e1-2  (spine=.7, super2=.6)
# e1-3: 10.1.11.8/31  to srl-leaf1 e1-2   (spine=.8,  leaf1=.9)
# e1-4: 10.1.11.10/31 to srl-leaf2 e1-2   (spine=.10, leaf2=.11)
# e1-5: 10.1.11.12/31 to srl-leaf3 e1-2   (spine=.12, leaf3=.13)
# e1-6: 10.1.11.14/31 to srl-leaf4 e1-2   (spine=.14, leaf4=.15)
# BGP: iBGP AS 65100, RR client of super1+super2

# ── Loopback ──────────────────────────────────────────────────────────────────
set / interface lo0 subinterface 0 ipv4 admin-state enable address 10.1.0.4/32
set / interface lo0 subinterface 0 ipv6 admin-state enable address fc00:1:4::1/128

# ── Uplinks to super-spines ───────────────────────────────────────────────────
set / interface ethernet-1/1 admin-state enable description "to srl-super1 e1-2"
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.1.10.3/31
set / interface ethernet-1/1 subinterface 0 ipv6 admin-state enable

set / interface ethernet-1/2 admin-state enable description "to srl-super2 e1-2"
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable address 10.1.10.7/31
set / interface ethernet-1/2 subinterface 0 ipv6 admin-state enable

# ── Downlinks to leaves ───────────────────────────────────────────────────────
set / interface ethernet-1/3 admin-state enable description "to srl-leaf1 e1-2"
set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable address 10.1.11.8/31
set / interface ethernet-1/3 subinterface 0 ipv6 admin-state enable

set / interface ethernet-1/4 admin-state enable description "to srl-leaf2 e1-2"
set / interface ethernet-1/4 subinterface 0 ipv4 admin-state enable address 10.1.11.10/31
set / interface ethernet-1/4 subinterface 0 ipv6 admin-state enable

set / interface ethernet-1/5 admin-state enable description "to srl-leaf3 e1-2"
set / interface ethernet-1/5 subinterface 0 ipv4 admin-state enable address 10.1.11.12/31
set / interface ethernet-1/5 subinterface 0 ipv6 admin-state enable

set / interface ethernet-1/6 admin-state enable description "to srl-leaf4 e1-2"
set / interface ethernet-1/6 subinterface 0 ipv4 admin-state enable address 10.1.11.14/31
set / interface ethernet-1/6 subinterface 0 ipv6 admin-state enable

# ── Default network instance ──────────────────────────────────────────────────
set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0
set / network-instance default interface ethernet-1/3.0
set / network-instance default interface ethernet-1/4.0
set / network-instance default interface ethernet-1/5.0
set / network-instance default interface ethernet-1/6.0

# ── IS-IS Level 2 underlay ────────────────────────────────────────────────────
set / network-instance default protocols isis instance main admin-state enable
set / network-instance default protocols isis instance main level-capability L2
set / network-instance default protocols isis instance main area-address [ 49.0001 ]
set / network-instance default protocols isis instance main net [ 49.0001.0010.0100.0004.00 ]
set / network-instance default protocols isis instance main router-id 10.1.0.4
set / network-instance default protocols isis instance main ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main ipv6-unicast admin-state enable
set / network-instance default protocols isis instance main interface lo0.0 passive true
set / network-instance default protocols isis instance main interface ethernet-1/1.0 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/2.0 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/3.0 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/4.0 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/5.0 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/6.0 circuit-type point-to-point

# ── SRv6 locator ─────────────────────────────────────────────────────────────
set / segment-routing srv6 admin-state enable
set / segment-routing srv6 locators locator Loc1 prefix fc00:1:4::/48
set / segment-routing srv6 locators locator Loc1 micro-segment-locator true
set / network-instance default protocols isis instance main segment-routing srv6 admin-state enable
set / network-instance default protocols isis instance main segment-routing srv6 locator Loc1

# ── iBGP EVPN — client of super-spines ───────────────────────────────────────
set / network-instance default protocols bgp autonomous-system 65100
set / network-instance default protocols bgp router-id 10.1.0.4

set / network-instance default protocols bgp group ibgp-evpn
set / network-instance default protocols bgp group ibgp-evpn peer-as 65100
set / network-instance default protocols bgp group ibgp-evpn afi-safi evpn admin-state enable
set / network-instance default protocols bgp group ibgp-evpn afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group ibgp-evpn transport local-address 10.1.0.4

set / network-instance default protocols bgp neighbor 10.1.0.1 peer-group ibgp-evpn
set / network-instance default protocols bgp neighbor 10.1.0.1 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.1.0.2 peer-group ibgp-evpn
set / network-instance default protocols bgp neighbor 10.1.0.2 failure-detection enable-bfd true

# ── BFD ───────────────────────────────────────────────────────────────────────
set / bfd subinterface ethernet-1/1.0 admin-state enable
set / bfd subinterface ethernet-1/1.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/1.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/1.0 detection-multiplier 3
set / bfd subinterface ethernet-1/2.0 admin-state enable
set / bfd subinterface ethernet-1/2.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/2.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/2.0 detection-multiplier 3
set / bfd subinterface ethernet-1/3.0 admin-state enable
set / bfd subinterface ethernet-1/3.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/3.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/3.0 detection-multiplier 3
set / bfd subinterface ethernet-1/4.0 admin-state enable
set / bfd subinterface ethernet-1/4.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/4.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/4.0 detection-multiplier 3
set / bfd subinterface ethernet-1/5.0 admin-state enable
set / bfd subinterface ethernet-1/5.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/5.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/5.0 detection-multiplier 3
set / bfd subinterface ethernet-1/6.0 admin-state enable
set / bfd subinterface ethernet-1/6.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/6.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/6.0 detection-multiplier 3
