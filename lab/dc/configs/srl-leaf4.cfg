# srl-leaf4 — DC lab leaf / VTEP (Nokia SR Linux)
# Role: VTEP, Tenant-A AND Tenant-B (mirrors leaf3)
# Loopback:  10.1.0.8/32   fc00:1:8::1/128
# e1-1: 10.1.11.7/31  to srl-spine1 e1-6  (leaf=.7, spine1=.6)
# e1-2: 10.1.11.15/31 to srl-spine2 e1-6  (leaf=.15, spine2=.14)
# e1-3: access port — host4 (192.168.100.104/24 Tenant-A; 192.168.200.104/24 Tenant-B)
# irb0.1: 192.168.100.1/24 anycast-gw Tenant-A
# irb0.2: 192.168.200.1/24 anycast-gw Tenant-B

set / interface lo0 subinterface 0 ipv4 admin-state enable address 10.1.0.8/32
set / interface lo0 subinterface 0 ipv6 admin-state enable address fc00:1:8::1/128

set / interface ethernet-1/1 admin-state enable description "to srl-spine1 e1-6"
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.1.11.7/31
set / interface ethernet-1/1 subinterface 0 ipv6 admin-state enable

set / interface ethernet-1/2 admin-state enable description "to srl-spine2 e1-6"
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable address 10.1.11.15/31
set / interface ethernet-1/2 subinterface 0 ipv6 admin-state enable

set / interface ethernet-1/3 admin-state enable description "host4 access — Tenant-A + Tenant-B"
set / interface ethernet-1/3 subinterface 0
set / interface ethernet-1/3 subinterface 1

set / interface irb0 admin-state enable
set / interface irb0 subinterface 1 admin-state enable
set / interface irb0 subinterface 1 ipv4 admin-state enable address 192.168.100.1/24
set / interface irb0 subinterface 1 anycast-gw admin-state enable
set / interface irb0 subinterface 1 anycast-gw anycast-gw-mac 00:00:00:00:01:01

set / interface irb0 subinterface 2 admin-state enable
set / interface irb0 subinterface 2 ipv4 admin-state enable address 192.168.200.1/24
set / interface irb0 subinterface 2 anycast-gw admin-state enable
set / interface irb0 subinterface 2 anycast-gw anycast-gw-mac 00:00:00:00:02:02

set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0

set / network-instance default protocols isis instance main admin-state enable
set / network-instance default protocols isis instance main level-capability L2
set / network-instance default protocols isis instance main area-address [ 49.0001 ]
set / network-instance default protocols isis instance main net [ 49.0001.0010.0100.0008.00 ]
set / network-instance default protocols isis instance main router-id 10.1.0.8
set / network-instance default protocols isis instance main ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main ipv6-unicast admin-state enable
set / network-instance default protocols isis instance main interface lo0.0 passive true
set / network-instance default protocols isis instance main interface ethernet-1/1.0 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/2.0 circuit-type point-to-point

set / segment-routing srv6 admin-state enable
set / segment-routing srv6 locators locator Loc1 prefix fc00:1:8::/48
set / segment-routing srv6 locators locator Loc1 micro-segment-locator true
set / network-instance default protocols isis instance main segment-routing srv6 admin-state enable
set / network-instance default protocols isis instance main segment-routing srv6 locator Loc1

set / network-instance default protocols bgp autonomous-system 65100
set / network-instance default protocols bgp router-id 10.1.0.8
set / network-instance default protocols bgp group ibgp-evpn
set / network-instance default protocols bgp group ibgp-evpn peer-as 65100
set / network-instance default protocols bgp group ibgp-evpn afi-safi evpn admin-state enable
set / network-instance default protocols bgp group ibgp-evpn afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group ibgp-evpn transport local-address 10.1.0.8
set / network-instance default protocols bgp neighbor 10.1.0.1 peer-group ibgp-evpn
set / network-instance default protocols bgp neighbor 10.1.0.1 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.1.0.2 peer-group ibgp-evpn
set / network-instance default protocols bgp neighbor 10.1.0.2 failure-detection enable-bfd true

set / tunnel-interface vxlan1
set / tunnel-interface vxlan1 vxlan-interface 1 type bridged
set / tunnel-interface vxlan1 vxlan-interface 1 ingress vni 1000
set / tunnel-interface vxlan1 vxlan-interface 2 type bridged
set / tunnel-interface vxlan1 vxlan-interface 2 ingress vni 2000
set / tunnel-interface vxlan1 vxlan-interface 100 type routed
set / tunnel-interface vxlan1 vxlan-interface 100 ingress vni 100100
set / tunnel-interface vxlan1 vxlan-interface 200 type routed
set / tunnel-interface vxlan1 vxlan-interface 200 ingress vni 100200

set / network-instance mac-vrf-a type mac-vrf
set / network-instance mac-vrf-a interface ethernet-1/3.0
set / network-instance mac-vrf-a interface irb0.1
set / network-instance mac-vrf-a vxlan-interface vxlan1.1
set / network-instance mac-vrf-a protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance mac-vrf-a protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan1.1
set / network-instance mac-vrf-a protocols bgp-evpn bgp-instance 1 evi 1
set / network-instance mac-vrf-a protocols bgp-evpn bgp-instance 1 ecmp 2
set / network-instance mac-vrf-a protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.1.0.8:1
set / network-instance mac-vrf-a protocols bgp-vpn bgp-instance 1 route-target export-rt target:65100:1
set / network-instance mac-vrf-a protocols bgp-vpn bgp-instance 1 route-target import-rt target:65100:1

set / network-instance ip-vrf-a type ip-vrf
set / network-instance ip-vrf-a interface irb0.1
set / network-instance ip-vrf-a vxlan-interface vxlan1.100
set / network-instance ip-vrf-a protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance ip-vrf-a protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan1.100
set / network-instance ip-vrf-a protocols bgp-evpn bgp-instance 1 evi 100
set / network-instance ip-vrf-a protocols bgp-evpn bgp-instance 1 ecmp 2
set / network-instance ip-vrf-a protocols bgp-evpn bgp-instance 1 routes route-table ip-prefix advertise true
set / network-instance ip-vrf-a protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.1.0.8:100
set / network-instance ip-vrf-a protocols bgp-vpn bgp-instance 1 route-target export-rt target:65100:100
set / network-instance ip-vrf-a protocols bgp-vpn bgp-instance 1 route-target import-rt target:65100:100

set / network-instance mac-vrf-b type mac-vrf
set / network-instance mac-vrf-b interface ethernet-1/3.1
set / network-instance mac-vrf-b interface irb0.2
set / network-instance mac-vrf-b vxlan-interface vxlan1.2
set / network-instance mac-vrf-b protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance mac-vrf-b protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan1.2
set / network-instance mac-vrf-b protocols bgp-evpn bgp-instance 1 evi 2
set / network-instance mac-vrf-b protocols bgp-evpn bgp-instance 1 ecmp 2
set / network-instance mac-vrf-b protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.1.0.8:2
set / network-instance mac-vrf-b protocols bgp-vpn bgp-instance 1 route-target export-rt target:65100:2
set / network-instance mac-vrf-b protocols bgp-vpn bgp-instance 1 route-target import-rt target:65100:2

set / network-instance ip-vrf-b type ip-vrf
set / network-instance ip-vrf-b interface irb0.2
set / network-instance ip-vrf-b vxlan-interface vxlan1.200
set / network-instance ip-vrf-b protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance ip-vrf-b protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan1.200
set / network-instance ip-vrf-b protocols bgp-evpn bgp-instance 1 evi 200
set / network-instance ip-vrf-b protocols bgp-evpn bgp-instance 1 ecmp 2
set / network-instance ip-vrf-b protocols bgp-evpn bgp-instance 1 routes route-table ip-prefix advertise true
set / network-instance ip-vrf-b protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.1.0.8:200
set / network-instance ip-vrf-b protocols bgp-vpn bgp-instance 1 route-target export-rt target:65100:200
set / network-instance ip-vrf-b protocols bgp-vpn bgp-instance 1 route-target import-rt target:65100:200

set / bfd subinterface ethernet-1/1.0 admin-state enable
set / bfd subinterface ethernet-1/1.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/1.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/1.0 detection-multiplier 3
set / bfd subinterface ethernet-1/2.0 admin-state enable
set / bfd subinterface ethernet-1/2.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/2.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/2.0 detection-multiplier 3
