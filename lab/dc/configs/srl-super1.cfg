# srl-super1 — DC lab super-spine (Nokia SR Linux)
# Role: EVPN route reflector; IS-IS L2 underlay; SRv6 locator
# Loopback:  10.1.0.1/32   fc00:1:1::1/128
# e1-1: 10.1.10.0/31  to srl-spine1 e1-1  (super=.0, spine1=.1)
# e1-2: 10.1.10.2/31  to srl-spine2 e1-1  (super=.2, spine2=.3)
# BGP: iBGP AS 65100, RR cluster-id 0.0.0.1, clients: spine1,spine2,leaf1-4
# Non-client peer: srl-super2 (10.1.0.2)

# ── Loopback ──────────────────────────────────────────────────────────────────
set / interface lo0 subinterface 0 ipv4 admin-state enable address 10.1.0.1/32
set / interface lo0 subinterface 0 ipv6 admin-state enable address fc00:1:1::1/128

# ── Data-plane interfaces ─────────────────────────────────────────────────────
set / interface ethernet-1/1 admin-state enable description "to srl-spine1 e1-1"
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.1.10.0/31
set / interface ethernet-1/1 subinterface 0 ipv6 admin-state enable

set / interface ethernet-1/2 admin-state enable description "to srl-spine2 e1-1"
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable address 10.1.10.2/31
set / interface ethernet-1/2 subinterface 0 ipv6 admin-state enable

# ── Default network instance ──────────────────────────────────────────────────
set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0

# ── IS-IS Level 2 underlay ────────────────────────────────────────────────────
set / network-instance default protocols isis instance main admin-state enable
set / network-instance default protocols isis instance main level-capability L2
set / network-instance default protocols isis instance main area-address [ 49.0001 ]
set / network-instance default protocols isis instance main net [ 49.0001.0010.0100.0001.00 ]
set / network-instance default protocols isis instance main router-id 10.1.0.1
set / network-instance default protocols isis instance main ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main ipv6-unicast admin-state enable
set / network-instance default protocols isis instance main interface lo0.0 passive true
set / network-instance default protocols isis instance main interface ethernet-1/1.0 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/2.0 circuit-type point-to-point

# ── SRv6 locator (micro-SID) ─────────────────────────────────────────────────
set / segment-routing srv6 admin-state enable
set / segment-routing srv6 locators locator Loc1 prefix fc00:1:1::/48
set / segment-routing srv6 locators locator Loc1 micro-segment-locator true
set / network-instance default protocols isis instance main segment-routing srv6 admin-state enable
set / network-instance default protocols isis instance main segment-routing srv6 locator Loc1

# ── iBGP EVPN — super1 is RR, cluster-id 0.0.0.1 ─────────────────────────────
set / network-instance default protocols bgp autonomous-system 65100
set / network-instance default protocols bgp router-id 10.1.0.1

# Group for RR clients (spines + leaves)
set / network-instance default protocols bgp group ibgp-evpn-clients
set / network-instance default protocols bgp group ibgp-evpn-clients peer-as 65100
set / network-instance default protocols bgp group ibgp-evpn-clients afi-safi evpn admin-state enable
set / network-instance default protocols bgp group ibgp-evpn-clients afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group ibgp-evpn-clients route-reflector client true
set / network-instance default protocols bgp group ibgp-evpn-clients route-reflector cluster-id 0.0.0.1
set / network-instance default protocols bgp group ibgp-evpn-clients transport local-address 10.1.0.1

# Group for peer RR (super2) — non-client
set / network-instance default protocols bgp group ibgp-evpn-rr
set / network-instance default protocols bgp group ibgp-evpn-rr peer-as 65100
set / network-instance default protocols bgp group ibgp-evpn-rr afi-safi evpn admin-state enable
set / network-instance default protocols bgp group ibgp-evpn-rr afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group ibgp-evpn-rr transport local-address 10.1.0.1

# RR peer: super2
set / network-instance default protocols bgp neighbor 10.1.0.2 peer-group ibgp-evpn-rr
set / network-instance default protocols bgp neighbor 10.1.0.2 failure-detection enable-bfd true

# RR clients
set / network-instance default protocols bgp neighbor 10.1.0.3 peer-group ibgp-evpn-clients
set / network-instance default protocols bgp neighbor 10.1.0.3 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.1.0.4 peer-group ibgp-evpn-clients
set / network-instance default protocols bgp neighbor 10.1.0.4 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.1.0.5 peer-group ibgp-evpn-clients
set / network-instance default protocols bgp neighbor 10.1.0.5 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.1.0.6 peer-group ibgp-evpn-clients
set / network-instance default protocols bgp neighbor 10.1.0.6 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.1.0.7 peer-group ibgp-evpn-clients
set / network-instance default protocols bgp neighbor 10.1.0.7 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.1.0.8 peer-group ibgp-evpn-clients
set / network-instance default protocols bgp neighbor 10.1.0.8 failure-detection enable-bfd true

# ── BFD (1 s — container platform minimum) ───────────────────────────────────
set / bfd subinterface ethernet-1/1.0 admin-state enable
set / bfd subinterface ethernet-1/1.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/1.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/1.0 detection-multiplier 3
set / bfd subinterface ethernet-1/2.0 admin-state enable
set / bfd subinterface ethernet-1/2.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/2.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/2.0 detection-multiplier 3

# gNMI enabled automatically by ContainerLab on port 57400
