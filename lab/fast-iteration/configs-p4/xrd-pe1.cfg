!! xrd-pe1 — Phase 4 lab (Cisco IOS-XRd, SP PE)
!! MgmtEth0/RP0/CPU0/0: 172.100.102.21/24  (management, assigned by clab)
!! Gi0/0/0/0: 10.0.14.1/31  (to srl-spine1 e1-3) — spine: .0, pe1: .1
!! Gi0/0/0/1: 10.0.24.1/31  (to srl-leaf1 e1-2)  — leaf1: .0, pe1: .1
!! Gi0/0/0/2: 10.0.34.1/31  (to srl-leaf2 e1-2)  — leaf2: .0, pe1: .1
!! BGP: eBGP AS 65100, peers with srl-spine1 (65001), srl-leaf1 (65011), srl-leaf2 (65012)
!! OSPF: area 0 underlay on all data-plane interfaces

hostname xrd-pe1

username cisco
 group root-lr
 group cisco-support
 secret 0 cisco123!
!

line default
 transport input ssh
!

netconf-yang agent
 ssh
!

ssh server v2
ssh server vrf default
ssh server netconf vrf default
!
vrf default
 address-family ipv4 unicast
 !
 address-family ipv6 unicast
 !
!
router static
 address-family ipv4 unicast
  0.0.0.0/0 MgmtEth0/RP0/CPU0/0 172.100.102.1
 !
 vrf default
!

interface Loopback0
 ipv4 address 10.255.0.4 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.0.14.1 255.255.255.254
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.0.24.1 255.255.255.254
 no shutdown
!
interface GigabitEthernet0/0/0/2
 ipv4 address 10.0.34.1 255.255.255.254
 no shutdown
!

interface MgmtEth0/RP0/CPU0/0
 vrf default
ipv4 address 172.100.102.21 255.255.255.0
!

!! OSPF underlay
router ospf 1
 router-id 10.255.0.4
 area 0
  interface Loopback0
   passive enable
  !
  interface GigabitEthernet0/0/0/0
   network point-to-point
  !
  interface GigabitEthernet0/0/0/1
   network point-to-point
  !
  interface GigabitEthernet0/0/0/2
   network point-to-point
  !
 !
!

!! eBGP overlay
router bgp 65100
 bgp router-id 10.255.0.4
 address-family ipv4 unicast
 !
 neighbor 10.0.14.0
  remote-as 65001
  address-family ipv4 unicast
  !
 !
 neighbor 10.0.24.0
  remote-as 65011
  address-family ipv4 unicast
  !
 !
 neighbor 10.0.34.0
  remote-as 65012
  address-family ipv4 unicast
  !
 !
!

lldp
!

grpc
 port 57400
 vrf default
 no-tls
 address-family dual
!
