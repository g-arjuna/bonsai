# srl-spine1 — Phase 4 lab (Nokia SR Linux, spine)
# Loopback: 10.255.0.1/32, prefix-SID 16001
# e1-1: 10.0.12.0/31  (to srl-leaf1 e1-1) — spine: .0, leaf1: .1
# e1-2: 10.0.13.0/31  (to srl-leaf2 e1-1) — spine: .0, leaf2: .1
# e1-3: 10.0.14.0/31  (to xrd-pe1 Gi0/0/0/0) — spine: .0, pe1: .1
# BGP: eBGP AS 65001, peers with srl-leaf1 (65011), srl-leaf2 (65012), xrd-pe1 (65100)
# OSPF: area 0 underlay on all data-plane interfaces + loopback (passive)

set / interface lo0 subinterface 0 ipv4 admin-state enable address 10.255.0.1/32

set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.0.12.0/31

set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable address 10.0.13.0/31

set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable address 10.0.14.0/31

set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0
set / network-instance default interface ethernet-1/3.0

# ── OSPF underlay ──────────────────────────────────────────────────────────────
set / network-instance default protocols ospf instance main version ospf-v2
set / network-instance default protocols ospf instance main admin-state enable
set / network-instance default protocols ospf instance main router-id 10.255.0.1
set / network-instance default protocols ospf instance main area 0.0.0.0 interface lo0.0 passive true
set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point
set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/2.0 interface-type point-to-point
set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/3.0 interface-type point-to-point

# ── SR-MPLS (prefix-SID on loopback) ──────────────────────────────────────────
set / network-instance default protocols ospf instance main segment-routing mpls
set / network-instance default protocols ospf instance main segment-routing sr-algorithms sr-algorithm 0
set / network-instance default protocols ospf instance main segment-routing prefix-sid-table connected-interfaces ipv4 10.255.0.1/32 sid-index 1

# ── eBGP overlay ───────────────────────────────────────────────────────────────
set / network-instance default protocols bgp autonomous-system 65001
set / network-instance default protocols bgp router-id 10.255.0.1
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable

set / network-instance default protocols bgp group ebgp afi-safi ipv4-unicast admin-state enable

set / network-instance default protocols bgp neighbor 10.0.12.1 peer-as 65011
set / network-instance default protocols bgp neighbor 10.0.12.1 peer-group ebgp

set / network-instance default protocols bgp neighbor 10.0.13.1 peer-as 65012
set / network-instance default protocols bgp neighbor 10.0.13.1 peer-group ebgp

set / network-instance default protocols bgp neighbor 10.0.14.1 peer-as 65100
set / network-instance default protocols bgp neighbor 10.0.14.1 peer-group ebgp

# gNMI enabled automatically by ContainerLab on port 57400 with clab-profile TLS
