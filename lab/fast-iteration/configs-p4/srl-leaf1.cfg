# srl-leaf1 — Phase 4 lab (Nokia SR Linux, leaf)
# Loopback: 10.255.0.2/32, prefix-SID 16002
# e1-1: 10.0.12.1/31  (to srl-spine1 e1-1)   — spine: .0, leaf1: .1
# e1-2: 10.0.24.0/31  (to xrd-pe1 Gi0/0/0/1) — leaf1: .0, pe1: .1
# BGP: eBGP AS 65011, peers with srl-spine1 (65001), xrd-pe1 (65100)
# OSPF: area 0 underlay

set / interface lo0 subinterface 0 ipv4 admin-state enable address 10.255.0.2/32

set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.0.12.1/31

set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable address 10.0.24.0/31

set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0

# ── OSPF underlay ──────────────────────────────────────────────────────────────
set / network-instance default protocols ospf instance main version ospf-v2
set / network-instance default protocols ospf instance main admin-state enable
set / network-instance default protocols ospf instance main router-id 10.255.0.2
set / network-instance default protocols ospf instance main area 0.0.0.0 interface lo0.0 passive true
set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point
set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/2.0 interface-type point-to-point

# ── SR-MPLS (prefix-SID on loopback) ──────────────────────────────────────────
set / network-instance default protocols ospf instance main segment-routing mpls
set / network-instance default protocols ospf instance main segment-routing sr-algorithms sr-algorithm 0
set / network-instance default protocols ospf instance main segment-routing prefix-sid-table connected-interfaces ipv4 10.255.0.2/32 sid-index 2

# ── eBGP overlay ───────────────────────────────────────────────────────────────
set / network-instance default protocols bgp autonomous-system 65011
set / network-instance default protocols bgp router-id 10.255.0.2
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable

set / network-instance default protocols bgp group ebgp afi-safi ipv4-unicast admin-state enable

set / network-instance default protocols bgp neighbor 10.0.12.0 peer-as 65001
set / network-instance default protocols bgp neighbor 10.0.12.0 peer-group ebgp

set / network-instance default protocols bgp neighbor 10.0.24.1 peer-as 65100
set / network-instance default protocols bgp neighbor 10.0.24.1 peer-group ebgp

# gNMI enabled automatically by ContainerLab on port 57400 with clab-profile TLS
