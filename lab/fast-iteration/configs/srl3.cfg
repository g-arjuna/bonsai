# srl3 — bonsai fast-iteration lab
# Loopback: 192.168.0.3/32
# e1-1: 10.0.13.1/31  (to srl1)
# e1-2: 10.0.23.1/31  (to srl2)
# BGP: iBGP AS 65000, full mesh via loopbacks

set / interface lo0 subinterface 0 ipv4 admin-state enable address 192.168.0.3/32

set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.0.13.1/31

set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable address 10.0.23.1/31

set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0

set / network-instance default protocols bgp autonomous-system 65000
set / network-instance default protocols bgp router-id 192.168.0.3
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable

set / network-instance default protocols bgp group ibgp-peers peer-as 65000
set / network-instance default protocols bgp group ibgp-peers local-as as-number 65000
set / network-instance default protocols bgp group ibgp-peers afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp group ibgp-peers transport local-address 192.168.0.3

set / network-instance default protocols bgp neighbor 192.168.0.1 peer-group ibgp-peers
set / network-instance default protocols bgp neighbor 192.168.0.2 peer-group ibgp-peers

set / network-instance default protocols ospf instance main admin-state enable
set / network-instance default protocols ospf instance main version ospf-v2
set / network-instance default protocols ospf instance main router-id 192.168.0.3
set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point
set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/2.0 interface-type point-to-point
set / network-instance default protocols ospf instance main area 0.0.0.0 interface lo0.0 passive true

# gNMI enabled automatically by ContainerLab on port 57400 with clab-profile TLS
