# srl1 — multi-vendor tri lab (SRL + XRd + cEOS)
# Loopback: 192.168.1.1/32
# e1-1: 10.1.12.0/31  (to xrd1 Gi0/0/0/0)  — srl1: .0, xrd1: .1
# e1-3: 10.1.14.0/31  (to ceos1 Ethernet1)  — srl1: .0, ceos1: .1
# BGP: eBGP AS 65101, peers with xrd1 (65102), ceos1 (65104)

set / interface lo0 subinterface 0 ipv4 admin-state enable address 192.168.1.1/32

set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.1.12.0/31

set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable address 10.1.14.0/31

set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/3.0

set / network-instance default protocols bgp autonomous-system 65101
set / network-instance default protocols bgp router-id 192.168.1.1
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable

set / network-instance default protocols bgp group ebgp-peers afi-safi ipv4-unicast admin-state enable

set / network-instance default protocols bgp neighbor 10.1.12.1 peer-as 65102
set / network-instance default protocols bgp neighbor 10.1.12.1 peer-group ebgp-peers

set / network-instance default protocols bgp neighbor 10.1.14.1 peer-as 65104
set / network-instance default protocols bgp neighbor 10.1.14.1 peer-group ebgp-peers

# gNMI enabled automatically by ContainerLab on port 57400 with clab-profile TLS
