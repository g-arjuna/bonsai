/* crpd1 — multi-vendor quad lab (Juniper cRPD 23.2R1.13)
   eth0: 172.100.101.31/24  (management, assigned by clab)
   eth1: 10.1.23.1/31  (to xrd1 Gi0/0/0/1) — xrd1: .0, crpd1: .1
   eth2: 10.1.31.0/31  (to srl1 e1-2)       — crpd1: .0, srl1: .1
   BGP: eBGP AS 65103
*/
system {
    host-name crpd1;
    root-authentication {
        plain-text-password-value "admin@123";
    }
    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                plain-text-password-value "admin@123";
            }
        }
    }
    services {
        ssh {
            root-login allow;
        }
        extension-service {
            request-response {
                grpc {
                    clear-text {
                        port 50051;
                    }
                    skip-authentication;
                }
            }
            notification {
                max-connections 5;
            }
        }
    }
}
interfaces {
    eth1 {
        unit 0 {
            family inet {
                address 10.1.23.1/31;
            }
        }
    }
    eth2 {
        unit 0 {
            family inet {
                address 10.1.31.0/31;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.1.3/32;
            }
        }
    }
}
routing-options {
    router-id 192.168.1.3;
    autonomous-system 65103;
    static {
        route 0.0.0.0/0 next-hop 172.100.101.1;
    }
}
protocols {
    bgp {
        group to-xrd {
            type external;
            peer-as 65102;
            neighbor 10.1.23.0;
        }
        group to-srl {
            type external;
            peer-as 65101;
            neighbor 10.1.31.1;
        }
    }
}
