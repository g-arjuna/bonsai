! ceos1 — multi-vendor quad lab (Arista cEOS 4.36.0F)
! Management0: 172.100.101.41/24  (management, assigned by clab)
! Ethernet1: 10.1.14.1/31  (to srl1 e1-3)  — srl1: .0, ceos1: .1
! Ethernet2: 10.1.24.1/31  (to xrd1 Gi0/0/0/2) — xrd1: .0, ceos1: .1
! BGP: eBGP AS 65104, peers with srl1 (65101) and xrd1 (65102)

hostname ceos1

username admin privilege 15 role network-admin secret admin

! Management routing — default route so SSH and gNMI replies route back correctly
ip route 0.0.0.0/0 172.100.101.1

interface Loopback0
   ip address 192.168.1.4/32

interface Ethernet1
   no switchport
   ip address 10.1.14.1/31

interface Ethernet2
   no switchport
   ip address 10.1.24.1/31

ip routing

router bgp 65104
   router-id 192.168.1.4
   neighbor 10.1.14.0 remote-as 65101
   neighbor 10.1.24.0 remote-as 65102
   !
   address-family ipv4
      neighbor 10.1.14.0 activate
      neighbor 10.1.24.0 activate
      network 192.168.1.4/32

management ssh
   no shutdown

management api gnmi
   transport grpc def
   !
   provider eos-native

management api http-commands
   no shutdown
