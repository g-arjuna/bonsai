!! xrd1 — multi-vendor quad lab (Cisco IOS-XRd)
!! MgmtEth0/RP0/CPU0/0: 172.100.101.21/24  (management, assigned by clab)
!! Gi0/0/0/0: 10.1.12.1/31  (to srl1 e1-1)
!! Gi0/0/0/1: 10.1.23.0/31  (to crpd1 eth1) — xrd1: .0, crpd1: .1
!! Gi0/0/0/2: 10.1.24.0/31  (to ceos1 eth2) — xrd1: .0, ceos1: .1
!! BGP: eBGP AS 65102

hostname xrd1

username cisco
 group root-lr
 group cisco-support
 secret 0 cisco123!
!

!! Management access
line default
 transport input ssh
!

netconf-yang agent
 ssh
!

!! SSH — keys generated via clab exec after boot
ssh server v2
ssh server vrf default
ssh server netconf vrf default
!
vrf default
 address-family ipv4 unicast
 !
 address-family ipv6 unicast
 !
!
!! Default route via management gateway so bonsai and SSH replies route correctly
router static
 address-family ipv4 unicast
  0.0.0.0/0 MgmtEth0/RP0/CPU0/0 172.100.101.1
 !
 vrf default
!

interface Loopback0
 ipv4 address 192.168.1.2 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.1.12.1 255.255.255.254
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.1.23.0 255.255.255.254
 no shutdown
!
interface GigabitEthernet0/0/0/2
 ipv4 address 10.1.24.0 255.255.255.254
 no shutdown
!

interface MgmtEth0/RP0/CPU0/0
 vrf default
ipv4 address 172.100.101.21 255.255.255.0
!

router bgp 65102
 bgp router-id 192.168.1.2
 address-family ipv4 unicast
 !
 neighbor 10.1.12.0
  remote-as 65101
  address-family ipv4 unicast
  !
 !
 neighbor 10.1.23.1
  remote-as 65103
  address-family ipv4 unicast
  !
 !
 neighbor 10.1.24.1
  remote-as 65104
  address-family ipv4 unicast
  !
 !
!

lldp
!

grpc
 port 57400
 vrf default
 no-tls
 address-family dual
!
