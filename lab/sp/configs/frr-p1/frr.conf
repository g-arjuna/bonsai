! frr-p1 — SP lab P router (FRR 9.x)
! Loopback: 10.2.0.4/32
! eth1: 10.2.10.1/31  to srl-pe1 e1-1  (p1=.1, pe1=.0)
! eth2: 10.2.10.2/31  to frr-p2 eth1   (p1=.2, p2=.3)
! eth3: 10.2.10.8/31  to srl-rr1 e1-2  (p1=.8, rr1=.9)
! SR-MPLS: label-index 4 → SID 104 (SRGB base 100)
! LDP: transport-address 10.2.0.4
frr version 9.0
frr defaults datacenter
hostname frr-p1
log syslog informational
!
interface lo
 ip address 10.2.0.4/32
 ip router isis BONSAI_SP
 isis passive
!
interface eth1
 description to-srl-pe1-e1-1
 ip address 10.2.10.1/31
 ip router isis BONSAI_SP
 isis network point-to-point
 isis circuit-type level-2-only
 bfd
!
interface eth2
 description to-frr-p2-eth1
 ip address 10.2.10.2/31
 ip router isis BONSAI_SP
 isis network point-to-point
 isis circuit-type level-2-only
 bfd
!
interface eth3
 description to-srl-rr1-e1-2
 ip address 10.2.10.8/31
 ip router isis BONSAI_SP
 isis network point-to-point
 isis circuit-type level-2-only
 bfd
!
router isis BONSAI_SP
 net 49.0001.0010.0200.0004.00
 is-type level-2-only
 metric-style wide
 !
 segment-routing on
 segment-routing node-msd 8
 segment-routing prefix 10.2.0.4/32 index 4 explicit-null
!
mpls ldp
 router-id 10.2.0.4
 !
 address-family ipv4
  discovery transport-address 10.2.0.4
  !
  interface eth1
  !
  interface eth2
  !
  interface eth3
  !
 exit-address-family
!
bfd
!
