# srl-pe3 — SP lab PE (Nokia SR Linux) — asymmetric edge
# Loopback: 10.2.0.3/32
# e1-1: 10.2.10.14/31 to frr-p2 eth4  (pe3=.14, p2=.15)
# SR-MPLS: label-index 3 → SID 103
# BGP: iBGP AS 65200, peers with rr1+rr2
# VRF-A and VRF-B: no CE in this lab; static seed route for test coverage

set / interface lo0 subinterface 0 ipv4 admin-state enable address 10.2.0.3/32

set / interface ethernet-1/1 admin-state enable description "to frr-p2 eth4"
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.2.10.14/31

set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0

set / network-instance default protocols isis instance main admin-state enable
set / network-instance default protocols isis instance main level-capability L2
set / network-instance default protocols isis instance main area-address [ 49.0001 ]
set / network-instance default protocols isis instance main net [ 49.0001.0010.0200.0003.00 ]
set / network-instance default protocols isis instance main router-id 10.2.0.3
set / network-instance default protocols isis instance main ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface lo0.0 passive true
set / network-instance default protocols isis instance main interface ethernet-1/1.0 circuit-type point-to-point
set / network-instance default protocols isis instance main segment-routing mpls admin-state enable
set / network-instance default protocols isis instance main segment-routing mpls prefix-sid-map ipv4-prefix 10.2.0.3/32 label-index 3 node-sid true

set / network-instance default protocols ldp admin-state enable
set / network-instance default protocols ldp discovery transport-address ipv4 10.2.0.3
set / network-instance default protocols ldp interface ethernet-1/1.0 admin-state enable

set / network-instance default protocols bgp autonomous-system 65200
set / network-instance default protocols bgp router-id 10.2.0.3
set / network-instance default protocols bgp group ibgp-vpn
set / network-instance default protocols bgp group ibgp-vpn peer-as 65200
set / network-instance default protocols bgp group ibgp-vpn afi-safi vpn-ipv4 admin-state enable
set / network-instance default protocols bgp group ibgp-vpn afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group ibgp-vpn transport local-address 10.2.0.3
set / network-instance default protocols bgp neighbor 10.2.0.6 peer-group ibgp-vpn
set / network-instance default protocols bgp neighbor 10.2.0.6 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.2.0.7 peer-group ibgp-vpn
set / network-instance default protocols bgp neighbor 10.2.0.7 failure-detection enable-bfd true

# VRF-A stub (no CE; static 10.99.3.0/24 simulates a branch network)
set / network-instance vrf-a type ip-vrf
set / network-instance vrf-a protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.2.0.3:100
set / network-instance vrf-a protocols bgp-vpn bgp-instance 1 route-target export-rt target:65200:100
set / network-instance vrf-a protocols bgp-vpn bgp-instance 1 route-target import-rt target:65200:100
set / network-instance vrf-a static-routes route 10.99.3.0/24 next-hop-group blackhole

# VRF-B stub (pe3 is only PE with VRF-B for test coverage of asymmetric VRF)
set / network-instance vrf-b type ip-vrf
set / network-instance vrf-b protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.2.0.3:200
set / network-instance vrf-b protocols bgp-vpn bgp-instance 1 route-target export-rt target:65200:200
set / network-instance vrf-b protocols bgp-vpn bgp-instance 1 route-target import-rt target:65200:200
set / network-instance vrf-b static-routes route 10.99.4.0/24 next-hop-group blackhole

set / bfd subinterface ethernet-1/1.0 admin-state enable
set / bfd subinterface ethernet-1/1.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/1.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/1.0 detection-multiplier 3
