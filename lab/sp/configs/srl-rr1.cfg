# srl-rr1 — SP lab Route Reflector (Nokia SR Linux)
# Loopback: 10.2.0.6/32
# e1-1: 10.2.10.7/31  to srl-pe1 e1-2  (rr1=.7, pe1=.6)
# e1-2: 10.2.10.9/31  to frr-p1 eth3   (rr1=.9, p1=.8)
# SR-MPLS: label-index 6 → SID 106
# BGP: iBGP AS 65200, RR cluster-id 0.0.0.6
# Clients: pe1, pe2, pe3 (VPN-IPv4 reflection)
# RR peer: rr2 (non-client)

set / interface lo0 subinterface 0 ipv4 admin-state enable address 10.2.0.6/32

set / interface ethernet-1/1 admin-state enable description "to srl-pe1 e1-2"
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.2.10.7/31

set / interface ethernet-1/2 admin-state enable description "to frr-p1 eth3"
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable address 10.2.10.9/31

set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0

set / network-instance default protocols isis instance main admin-state enable
set / network-instance default protocols isis instance main level-capability L2
set / network-instance default protocols isis instance main area-address [ 49.0001 ]
set / network-instance default protocols isis instance main net [ 49.0001.0010.0200.0006.00 ]
set / network-instance default protocols isis instance main router-id 10.2.0.6
set / network-instance default protocols isis instance main ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface lo0.0 passive true
set / network-instance default protocols isis instance main interface ethernet-1/1.0 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/2.0 circuit-type point-to-point
set / network-instance default protocols isis instance main segment-routing mpls admin-state enable
set / network-instance default protocols isis instance main segment-routing mpls prefix-sid-map ipv4-prefix 10.2.0.6/32 label-index 6 node-sid true

set / network-instance default protocols ldp admin-state enable
set / network-instance default protocols ldp discovery transport-address ipv4 10.2.0.6
set / network-instance default protocols ldp interface ethernet-1/1.0 admin-state enable
set / network-instance default protocols ldp interface ethernet-1/2.0 admin-state enable

# iBGP — RR for VPN-IPv4
set / network-instance default protocols bgp autonomous-system 65200
set / network-instance default protocols bgp router-id 10.2.0.6

# RR client group (PE nodes)
set / network-instance default protocols bgp group ibgp-vpn-clients
set / network-instance default protocols bgp group ibgp-vpn-clients peer-as 65200
set / network-instance default protocols bgp group ibgp-vpn-clients afi-safi vpn-ipv4 admin-state enable
set / network-instance default protocols bgp group ibgp-vpn-clients afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group ibgp-vpn-clients route-reflector client true
set / network-instance default protocols bgp group ibgp-vpn-clients route-reflector cluster-id 0.0.0.6
set / network-instance default protocols bgp group ibgp-vpn-clients transport local-address 10.2.0.6

# RR peer group (rr2)
set / network-instance default protocols bgp group ibgp-vpn-rr
set / network-instance default protocols bgp group ibgp-vpn-rr peer-as 65200
set / network-instance default protocols bgp group ibgp-vpn-rr afi-safi vpn-ipv4 admin-state enable
set / network-instance default protocols bgp group ibgp-vpn-rr afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group ibgp-vpn-rr transport local-address 10.2.0.6

set / network-instance default protocols bgp neighbor 10.2.0.2 peer-group ibgp-vpn-clients
set / network-instance default protocols bgp neighbor 10.2.0.2 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.2.0.1 peer-group ibgp-vpn-clients
set / network-instance default protocols bgp neighbor 10.2.0.1 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.2.0.3 peer-group ibgp-vpn-clients
set / network-instance default protocols bgp neighbor 10.2.0.3 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.2.0.7 peer-group ibgp-vpn-rr
set / network-instance default protocols bgp neighbor 10.2.0.7 failure-detection enable-bfd true

set / bfd subinterface ethernet-1/1.0 admin-state enable
set / bfd subinterface ethernet-1/1.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/1.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/1.0 detection-multiplier 3
set / bfd subinterface ethernet-1/2.0 admin-state enable
set / bfd subinterface ethernet-1/2.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/2.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/2.0 detection-multiplier 3
