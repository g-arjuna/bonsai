! frr-p2 — SP lab P router (FRR 9.x)
! Loopback: 10.2.0.5/32
! eth1: 10.2.10.3/31  to frr-p1 eth2   (p2=.3, p1=.2)
! eth2: 10.2.10.4/31  to srl-pe2 e1-1  (p2=.4, pe2=.5)
! eth3: 10.2.10.10/31 to srl-rr2 e1-1  (p2=.10, rr2=.11)
! eth4: 10.2.10.15/31 to srl-pe3 e1-1  (p2=.15, pe3=.14)
! SR-MPLS: label-index 5 → SID 105
frr version 9.0
frr defaults datacenter
hostname frr-p2
log syslog informational
!
interface lo
 ip address 10.2.0.5/32
 ip router isis BONSAI_SP
 isis passive
!
interface eth1
 description to-frr-p1-eth2
 ip address 10.2.10.3/31
 ip router isis BONSAI_SP
 isis network point-to-point
 isis circuit-type level-2-only
 bfd
!
interface eth2
 description to-srl-pe2-e1-1
 ip address 10.2.10.4/31
 ip router isis BONSAI_SP
 isis network point-to-point
 isis circuit-type level-2-only
 bfd
!
interface eth3
 description to-srl-rr2-e1-1
 ip address 10.2.10.10/31
 ip router isis BONSAI_SP
 isis network point-to-point
 isis circuit-type level-2-only
 bfd
!
interface eth4
 description to-srl-pe3-e1-1
 ip address 10.2.10.15/31
 ip router isis BONSAI_SP
 isis network point-to-point
 isis circuit-type level-2-only
 bfd
!
router isis BONSAI_SP
 net 49.0001.0010.0200.0005.00
 is-type level-2-only
 metric-style wide
 !
 segment-routing on
 segment-routing node-msd 8
 segment-routing prefix 10.2.0.5/32 index 5 explicit-null
!
mpls ldp
 router-id 10.2.0.5
 !
 address-family ipv4
  discovery transport-address 10.2.0.5
  !
  interface eth1
  !
  interface eth2
  !
  interface eth3
  !
  interface eth4
  !
 exit-address-family
!
bfd
!
