# srl-pe1 — SP lab PE (Nokia SR Linux)
# Loopback: 10.2.0.1/32
# e1-1: 10.2.10.0/31  to frr-p1 eth1  (pe1=.0, p1=.1)
# e1-2: 10.2.10.6/31  to srl-rr1 e1-1 (pe1=.6, rr1=.7)
# e1-3: 10.2.10.17/31 to frr-ce1 eth1 (pe1=.17, ce1=.16) — in VRF-A
# SR-MPLS: label-index 1 → SID 101
# BGP: iBGP AS 65200, peers with rr1+rr2 (VPN-IPv4)
# VRF-A: eBGP CE1 AS 65300, RT target:65200:100
# SR-TE policy color 100: explicit path pe1→p1(104)→p2(105)→pe2

# ── Loopback ──────────────────────────────────────────────────────────────────
set / interface lo0 subinterface 0 ipv4 admin-state enable address 10.2.0.1/32

# ── Backbone interfaces ───────────────────────────────────────────────────────
set / interface ethernet-1/1 admin-state enable description "to frr-p1 eth1"
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable address 10.2.10.0/31

set / interface ethernet-1/2 admin-state enable description "to srl-rr1 e1-1"
set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable address 10.2.10.6/31

# ── CE-facing interface (VRF-A) ───────────────────────────────────────────────
set / interface ethernet-1/3 admin-state enable description "to frr-ce1 eth1 — VRF-A"
set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable address 10.2.10.17/31

# ── Default NI (underlay) ─────────────────────────────────────────────────────
set / network-instance default interface lo0.0
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0

# ── IS-IS Level 2 + SR-MPLS ──────────────────────────────────────────────────
set / network-instance default protocols isis instance main admin-state enable
set / network-instance default protocols isis instance main level-capability L2
set / network-instance default protocols isis instance main area-address [ 49.0001 ]
set / network-instance default protocols isis instance main net [ 49.0001.0010.0200.0001.00 ]
set / network-instance default protocols isis instance main router-id 10.2.0.1
set / network-instance default protocols isis instance main ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface lo0.0 passive true
set / network-instance default protocols isis instance main interface ethernet-1/1.0 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/2.0 circuit-type point-to-point
# SR-MPLS: enable and assign prefix SID index 1 (SID = SRGB_start + 1 = 101)
set / network-instance default protocols isis instance main segment-routing mpls admin-state enable
set / network-instance default protocols isis instance main segment-routing mpls prefix-sid-map ipv4-prefix 10.2.0.1/32 label-index 1 node-sid true

# ── LDP (coexisting with SR-MPLS) ────────────────────────────────────────────
set / network-instance default protocols ldp admin-state enable
set / network-instance default protocols ldp discovery transport-address ipv4 10.2.0.1
set / network-instance default protocols ldp interface ethernet-1/1.0 admin-state enable
set / network-instance default protocols ldp interface ethernet-1/2.0 admin-state enable

# ── iBGP for L3VPN — client of rr1 + rr2 ────────────────────────────────────
set / network-instance default protocols bgp autonomous-system 65200
set / network-instance default protocols bgp router-id 10.2.0.1

set / network-instance default protocols bgp group ibgp-vpn
set / network-instance default protocols bgp group ibgp-vpn peer-as 65200
set / network-instance default protocols bgp group ibgp-vpn afi-safi vpn-ipv4 admin-state enable
set / network-instance default protocols bgp group ibgp-vpn afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group ibgp-vpn transport local-address 10.2.0.1

set / network-instance default protocols bgp neighbor 10.2.0.6 peer-group ibgp-vpn
set / network-instance default protocols bgp neighbor 10.2.0.6 failure-detection enable-bfd true
set / network-instance default protocols bgp neighbor 10.2.0.7 peer-group ibgp-vpn
set / network-instance default protocols bgp neighbor 10.2.0.7 failure-detection enable-bfd true

# ── VRF-A (Tenant-A L3VPN) ───────────────────────────────────────────────────
set / network-instance vrf-a type ip-vrf
set / network-instance vrf-a interface ethernet-1/3.0
set / network-instance vrf-a protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.2.0.1:100
set / network-instance vrf-a protocols bgp-vpn bgp-instance 1 route-target export-rt target:65200:100
set / network-instance vrf-a protocols bgp-vpn bgp-instance 1 route-target import-rt target:65200:100
set / network-instance vrf-a protocols bgp autonomous-system 65200
set / network-instance vrf-a protocols bgp router-id 10.2.0.1
set / network-instance vrf-a protocols bgp group ce-bgp
set / network-instance vrf-a protocols bgp group ce-bgp peer-as 65300
set / network-instance vrf-a protocols bgp group ce-bgp afi-safi ipv4-unicast admin-state enable
set / network-instance vrf-a protocols bgp neighbor 10.2.10.16 peer-group ce-bgp

# ── SR-TE policy: color 100, endpoint pe2 (10.2.0.2), explicit via p1→p2 ─────
# Segment list: SID 104 (p1) → SID 105 (p2) → endpoint 10.2.0.2
set / network-instance default segment-routing sr-policies policy bonsai-pe1-pe2
set / network-instance default segment-routing sr-policies policy bonsai-pe1-pe2 color 100
set / network-instance default segment-routing sr-policies policy bonsai-pe1-pe2 endpoint 10.2.0.2
set / network-instance default segment-routing sr-policies policy bonsai-pe1-pe2 candidate-paths preference 100 name explicit-p1-p2
set / network-instance default segment-routing sr-policies policy bonsai-pe1-pe2 candidate-paths preference 100 explicit-path hop-list 10 mpls-label 104
set / network-instance default segment-routing sr-policies policy bonsai-pe1-pe2 candidate-paths preference 100 explicit-path hop-list 20 mpls-label 105

# ── BFD ───────────────────────────────────────────────────────────────────────
set / bfd subinterface ethernet-1/1.0 admin-state enable
set / bfd subinterface ethernet-1/1.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/1.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/1.0 detection-multiplier 3
set / bfd subinterface ethernet-1/2.0 admin-state enable
set / bfd subinterface ethernet-1/2.0 desired-minimum-transmit-interval 1000000
set / bfd subinterface ethernet-1/2.0 required-minimum-receive 1000000
set / bfd subinterface ethernet-1/2.0 detection-multiplier 3
